# Git Cache Warmer DaemonSet
# Maintains bare git clones of frequently-used repositories on each runner node.
# Workflow job pods mount the cache read-only and use GIT_ALTERNATE_OBJECT_DIRECTORIES
# to reuse cached objects during `git fetch`, avoiding re-downloads.
#
# The DaemonSet targets all Karpenter-managed runner nodes (workload-type:
# github-runner) and tolerates every taint used by runner NodePools.
#
# On fresh nodes, Karpenter applies a `git-cache-not-ready` startupTaint.
# Once the initial fetch completes, this DaemonSet removes the taint so that
# workflow job pods (which do NOT tolerate it) can schedule.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-cache-warmer-script
  namespace: kube-system
data:
  warm-cache.sh: |
    #!/bin/sh
    set -eu

    CACHE_DIR="/mnt/git-cache"
    FETCH_INTERVAL="${FETCH_INTERVAL:-300}"
    TAINT_KEY="git-cache-not-ready"

    # Repositories to cache (org/repo pairs)
    REPOS="
    pytorch/pytorch
    pytorch/test-infra
    "

    log() {
      echo "[$(date -Iseconds 2>/dev/null || date)] $*"
    }

    # Install dependencies (alpine)
    log "Installing dependencies..."
    apk add --no-cache git curl jq >/dev/null 2>&1

    log "Git version: $(git --version)"
    log "Cache directory: ${CACHE_DIR}"
    log "Fetch interval: ${FETCH_INTERVAL}s"
    log "Node: ${NODE_NAME:-unknown}"

    # =========================================================================
    # Create a git system config that marks the cache as a safe directory.
    # The DaemonSet runs as root so all cache files are owned by UID 0, but
    # job pods run as UID 1000. Without this, git's safe.directory ownership
    # check silently blocks `for_each_alternate_ref()` from enumerating refs
    # in the cache — which means fetch negotiation sends zero `have` lines
    # and the server ships every object as if the cache didn't exist.
    # Job pods mount this file via GIT_CONFIG_SYSTEM env var.
    # =========================================================================
    cat > "${CACHE_DIR}/.gitconfig" <<GITEOF
    [safe]
    	directory = *
    GITEOF
    log "Created ${CACHE_DIR}/.gitconfig (safe.directory = *)"

    # =========================================================================
    # Helper: remove the git-cache-not-ready startup taint from this node.
    # Karpenter adds this taint to fresh nodes; job pods don't tolerate it,
    # so they stay Pending until we remove it (i.e., until the cache is warm).
    # =========================================================================
    remove_startup_taint() {
      if [ -z "${NODE_NAME:-}" ]; then
        log "WARN: NODE_NAME not set, cannot remove startup taint"
        return 0
      fi

      _token_file="/var/run/secrets/kubernetes.io/serviceaccount/token"
      _cacert="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      _api="https://kubernetes.default.svc"

      if [ ! -f "$_token_file" ]; then
        log "WARN: ServiceAccount token not found, cannot remove startup taint"
        return 0
      fi

      _token=$(cat "$_token_file")

      # Get current taints from the node
      _node_json=$(curl -sf --cacert "$_cacert" \
        -H "Authorization: Bearer $_token" \
        "${_api}/api/v1/nodes/${NODE_NAME}") || {
        log "WARN: Failed to GET node ${NODE_NAME}"
        return 0
      }

      # Check if our taint exists
      _has_taint=$(echo "$_node_json" | jq --arg key "$TAINT_KEY" \
        '[.spec.taints // [] | .[] | select(.key == $key)] | length')

      if [ "$_has_taint" = "0" ]; then
        log "Startup taint already absent from ${NODE_NAME}"
        return 0
      fi

      # Build new taints list without our taint
      _new_taints=$(echo "$_node_json" | jq --arg key "$TAINT_KEY" \
        '[.spec.taints // [] | .[] | select(.key != $key)]')

      # If empty, set to null to remove the field entirely
      if [ "$(echo "$_new_taints" | jq 'length')" = "0" ]; then
        _patch='{"spec":{"taints":null}}'
      else
        _patch=$(jq -n --argjson taints "$_new_taints" '{"spec":{"taints":$taints}}')
      fi

      _status=$(curl -s -o /dev/null -w "%{http_code}" --cacert "$_cacert" \
        -H "Authorization: Bearer $_token" \
        -H "Content-Type: application/merge-patch+json" \
        -XPATCH "${_api}/api/v1/nodes/${NODE_NAME}" \
        -d "$_patch")

      if [ "$_status" = "200" ]; then
        log "Removed ${TAINT_KEY} taint from node ${NODE_NAME}"
      else
        log "WARN: Failed to remove taint (HTTP ${_status})"
      fi
    }

    # =========================================================================
    # Helper: ensure bare repo skeleton exists
    # =========================================================================
    ensure_skeleton() {
      _repo="$1"
      _org=$(echo "$_repo" | cut -d/ -f1)
      _name=$(echo "$_repo" | cut -d/ -f2)
      _repo_dir="${CACHE_DIR}/${_org}/${_name}.git"

      if [ ! -d "${_repo_dir}/objects" ]; then
        log "Pre-creating bare repo skeleton: ${_repo_dir}"
        mkdir -p "${CACHE_DIR}/${_org}"
        git init --bare "${_repo_dir}" >/dev/null 2>&1
        git -C "${_repo_dir}" remote add origin "https://github.com/${_repo}.git" 2>/dev/null || true
      fi
    }

    # =========================================================================
    # Helper: fetch a single repo (safe to run as a background job)
    # =========================================================================
    # Handles its own retries and always returns 0 so that a single repo
    # failure doesn't kill the script (set -e + wait).
    fetch_repo() {
      _repo="$1"
      _org=$(echo "$_repo" | cut -d/ -f1)
      _name=$(echo "$_repo" | cut -d/ -f2)
      _repo_dir="${CACHE_DIR}/${_org}/${_name}.git"

      # Ensure remote is configured
      if ! git -C "${_repo_dir}" remote get-url origin >/dev/null 2>&1; then
        git -C "${_repo_dir}" remote add origin "https://github.com/${_repo}.git"
      fi

      # Already populated?
      if git -C "${_repo_dir}" show-ref --quiet 2>/dev/null; then
        log "Cache hit: ${_repo} (already populated)"
        return 0
      fi

      log "Cache miss: ${_repo} — fetching objects..."
      _attempt=0
      _max=3
      while [ $_attempt -lt $_max ]; do
        _attempt=$((_attempt + 1))
        if git -C "${_repo_dir}" fetch origin 2>&1; then
          log "Fetched ${_repo} successfully (attempt ${_attempt})"
          return 0
        fi
        log "Fetch attempt ${_attempt}/${_max} failed for ${_repo}"
        [ $_attempt -lt $_max ] && sleep 10
      done

      log "ERROR: Failed to fetch ${_repo} after ${_max} attempts"
      return 0  # don't propagate failure to wait
    }

    # =========================================================================
    # Helper: refresh a single repo (periodic fetch, background-safe)
    # =========================================================================
    refresh_repo() {
      _repo="$1"
      _org=$(echo "$_repo" | cut -d/ -f1)
      _name=$(echo "$_repo" | cut -d/ -f2)
      _repo_dir="${CACHE_DIR}/${_org}/${_name}.git"

      ensure_skeleton "$_repo"

      if git -C "${_repo_dir}" fetch origin --prune --tags 2>&1; then
        log "Fetched ${_repo}"
      else
        log "WARN: fetch failed for ${_repo} (will retry next cycle)"
      fi
      return 0
    }

    # =========================================================================
    # Pre-create bare repo skeletons (sequential — instant)
    # =========================================================================
    # Job pods set GIT_ALTERNATE_OBJECT_DIRECTORIES pointing at these paths.
    # If the directory doesn't exist, git emits "unable to normalize alternate
    # object path" errors on every operation. By creating a bare repo skeleton
    # immediately (before the potentially slow initial fetch), we ensure the
    # objects/ directory exists and git can resolve the path — it just won't
    # find any cached objects yet, which is fine.
    for repo in $REPOS; do
      repo=$(echo "$repo" | xargs)
      [ -z "$repo" ] && continue
      ensure_skeleton "$repo"
    done

    # =========================================================================
    # Initial fetch — all repos in parallel
    # =========================================================================
    log "Starting initial fetch for all repos in parallel..."
    for repo in $REPOS; do
      repo=$(echo "$repo" | xargs)
      [ -z "$repo" ] && continue
      fetch_repo "$repo" &
    done
    wait
    log "Initial cache warm-up complete"

    # Remove the startup taint so job pods can schedule on this node
    remove_startup_taint

    # =========================================================================
    # Periodic fetch loop — all repos in parallel each cycle
    # =========================================================================
    while true; do
      sleep "${FETCH_INTERVAL}"
      log "Starting periodic fetch cycle..."

      for repo in $REPOS; do
        repo=$(echo "$repo" | xargs)
        [ -z "$repo" ] && continue
        refresh_repo "$repo" &
      done
      wait
      log "Periodic fetch cycle complete"
    done

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: git-cache-warmer
  namespace: kube-system
  labels:
    app: git-cache-warmer
    app.kubernetes.io/name: git-cache-warmer
    app.kubernetes.io/component: node-configuration
spec:
  selector:
    matchLabels:
      app: git-cache-warmer

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "25%"

  template:
    metadata:
      labels:
        app: git-cache-warmer

    spec:
      priorityClassName: system-node-critical

      # Tolerate ALL taints used by Karpenter nodepools
      tolerations:
        # Karpenter instance-type taints (used by all nodepools)
        - key: instance-type
          operator: Exists
          effect: NoSchedule

        # Git cache startup taint (we remove this after warm-up)
        - key: git-cache-not-ready
          operator: Exists
          effect: NoSchedule

        # GPU taints
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

        # CPU architecture taints
        - key: cpu-type
          operator: Exists
          effect: NoSchedule

        # Karpenter default taints
        - key: karpenter.sh/unschedulable
          operator: Exists
          effect: NoSchedule

        # System taints
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/pid-pressure
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/unschedulable
          operator: Exists
          effect: NoSchedule

      # Run on Karpenter-managed runner nodes and buildkit nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - github-runner
                      - buildkit

      serviceAccountName: git-cache-warmer

      containers:
        - name: git-cache
          image: public.ecr.aws/docker/library/alpine:3.19
          command: ["/bin/sh", "/scripts/warm-cache.sh"]

          env:
            - name: FETCH_INTERVAL
              value: "300"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi

          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: git-cache
              mountPath: /mnt/git-cache

      volumes:
        - name: scripts
          configMap:
            name: git-cache-warmer-script
            defaultMode: 0755

        - name: git-cache
          hostPath:
            path: /mnt/git-cache
            type: DirectoryOrCreate

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-cache-warmer
  namespace: kube-system
  labels:
    app: git-cache-warmer

---
# RBAC: Allow git-cache-warmer to read and patch nodes
# Required to remove the git-cache-not-ready startup taint after warm-up
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: git-cache-warmer
  labels:
    app: git-cache-warmer
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: git-cache-warmer
  labels:
    app: git-cache-warmer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: git-cache-warmer
subjects:
  - kind: ServiceAccount
    name: git-cache-warmer
    namespace: kube-system
