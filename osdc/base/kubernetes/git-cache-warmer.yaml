# Git Cache Warmer DaemonSet — Node-local git cache via rsync from central server
# Syncs git repository caches from the centralized git-cache-server (StatefulSet)
# to each runner/buildkit node using rsync over the cluster network.
#
# Uses double-buffer pattern:
#   /mnt/git-cache-a/  and  /mnt/git-cache-b/  — two physical directories
#   /mnt/git-cache → a or b                     — symlink, swapped via ln -sfn
#
# Runner/BuildKit pods mount /mnt/git-cache read-only (resolves symlink at
# bind-mount time). The DaemonSet syncs into the inactive buffer, then swaps
# the symlink. Running pods keep their bind mount to the old directory.
#
# On fresh nodes, Karpenter applies a `git-cache-not-ready` startupTaint.
# Once the initial sync completes, this DaemonSet removes the taint so that
# workflow job pods (which do NOT tolerate it) can schedule.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-cache-warmer-script
  namespace: kube-system
data:
  warm-cache.sh: |
    #!/bin/sh
    set -eu

    CACHE_A="/mnt/git-cache-a"
    CACHE_B="/mnt/git-cache-b"
    PUBLISHED="/mnt/git-cache"
    SYNC_INTERVAL="${FETCH_INTERVAL:-60}"
    RSYNC_TARGET="rsync://git-cache-server.kube-system:873/git-cache"

    log() {
      echo "[$(date -Iseconds 2>/dev/null || date)] $*"
    }

    # Install dependencies (alpine) — only rsync needed, no git
    log "Installing dependencies..."
    apk add --no-cache rsync curl jq >/dev/null 2>&1

    log "Sync interval: ${SYNC_INTERVAL}s"
    log "Rsync target: ${RSYNC_TARGET}"
    log "Node: ${NODE_NAME:-unknown}"

    # --- Remove the git-cache-not-ready startup taint ---
    # Karpenter adds this taint to fresh nodes; job pods don't tolerate it,
    # so they stay Pending until we remove it (i.e., until the cache is warm).
    remove_startup_taint() {
      if [ -z "${NODE_NAME:-}" ]; then
        log "WARN: NODE_NAME not set, cannot remove startup taint"
        return 0
      fi

      _token_file="/var/run/secrets/kubernetes.io/serviceaccount/token"
      _cacert="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
      _api="https://kubernetes.default.svc"

      if [ ! -f "$_token_file" ]; then
        log "WARN: ServiceAccount token not found, cannot remove startup taint"
        return 0
      fi

      _token=$(cat "$_token_file")

      # Get current taints from the node
      _node_json=$(curl -sf --cacert "$_cacert" \
        -H "Authorization: Bearer $_token" \
        "${_api}/api/v1/nodes/${NODE_NAME}") || {
        log "WARN: Failed to GET node ${NODE_NAME}"
        return 0
      }

      # Check if our taint exists
      _has_taint=$(echo "$_node_json" | jq --arg key "git-cache-not-ready" \
        '[.spec.taints // [] | .[] | select(.key == $key)] | length')

      if [ "$_has_taint" = "0" ]; then
        log "Startup taint already absent from ${NODE_NAME}"
        return 0
      fi

      # Build new taints list without our taint
      _new_taints=$(echo "$_node_json" | jq --arg key "git-cache-not-ready" \
        '[.spec.taints // [] | .[] | select(.key != $key)]')

      # If empty, set to null to remove the field entirely
      if [ "$(echo "$_new_taints" | jq 'length')" = "0" ]; then
        _patch='{"spec":{"taints":null}}'
      else
        _patch=$(jq -n --argjson taints "$_new_taints" '{"spec":{"taints":$taints}}')
      fi

      _status=$(curl -s -o /dev/null -w "%{http_code}" --cacert "$_cacert" \
        -H "Authorization: Bearer $_token" \
        -H "Content-Type: application/merge-patch+json" \
        -XPATCH "${_api}/api/v1/nodes/${NODE_NAME}" \
        -d "$_patch")

      if [ "$_status" = "200" ]; then
        log "Removed git-cache-not-ready taint from node ${NODE_NAME}"
      else
        log "WARN: Failed to remove taint (HTTP ${_status})"
      fi
    }

    # --- Double-buffer initialization ---
    # Handle migration: if /mnt/git-cache is a real directory (not symlink),
    # it's from the old DaemonSet. Adopt it as buffer-a.
    if [ -d "$PUBLISHED" ] && [ ! -L "$PUBLISHED" ]; then
        log "Migration: adopting existing ${PUBLISHED} as buffer-a"
        mv "$PUBLISHED" "$CACHE_A"
        mkdir -p "$CACHE_B"
        ln -s "$CACHE_A" "$PUBLISHED"
    elif [ ! -L "$PUBLISHED" ]; then
        # Fresh node: create both buffers and symlink
        log "Fresh node: initializing double-buffer"
        mkdir -p "$CACHE_A" "$CACHE_B"
        ln -s "$CACHE_A" "$PUBLISHED"
    fi

    # --- Wait for central server ---
    log "Waiting for git-cache-server..."
    until rsync --list-only "${RSYNC_TARGET}/" >/dev/null 2>&1; do
        sleep 5
    done
    log "git-cache-server is reachable"

    # --- Initial sync ---
    ACTIVE=$(readlink "$PUBLISHED")
    if [ "$ACTIVE" = "$CACHE_A" ]; then INACTIVE="$CACHE_B"; else INACTIVE="$CACHE_A"; fi

    log "Initial sync into ${INACTIVE}..."
    rsync -a --delete --no-compress "${RSYNC_TARGET}/" "${INACTIVE}/"

    # Write .gitconfig into synced buffer
    cat > "${INACTIVE}/.gitconfig" <<'GITEOF'
    [safe]
    	directory = *
    GITEOF

    # Swap symlink (ln -sfn: -n prevents following existing symlink-to-dir)
    ln -sfn "$INACTIVE" "$PUBLISHED"
    log "Initial sync complete — published: ${INACTIVE}"

    # Remove startup taint — runners can now schedule
    remove_startup_taint

    # --- Periodic sync loop ---
    while true; do
        sleep "$SYNC_INTERVAL"

        ACTIVE=$(readlink "$PUBLISHED")
        if [ "$ACTIVE" = "$CACHE_A" ]; then INACTIVE="$CACHE_B"; else INACTIVE="$CACHE_A"; fi

        if rsync -a --delete --no-compress "${RSYNC_TARGET}/" "${INACTIVE}/"; then
            cat > "${INACTIVE}/.gitconfig" <<'GITEOF'
    [safe]
    	directory = *
    GITEOF
            ln -sfn "$INACTIVE" "$PUBLISHED"
            log "Sync complete — swapped to ${INACTIVE}"
        else
            log "WARN: rsync failed, will retry next cycle"
        fi
    done

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: git-cache-warmer
  namespace: kube-system
  labels:
    app: git-cache-warmer
    app.kubernetes.io/name: git-cache-warmer
    app.kubernetes.io/component: node-configuration
spec:
  selector:
    matchLabels:
      app: git-cache-warmer

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "25%"

  template:
    metadata:
      labels:
        app: git-cache-warmer

    spec:
      priorityClassName: system-node-critical

      # Tolerate ALL taints used by Karpenter nodepools
      tolerations:
        # Karpenter instance-type taints (used by all nodepools)
        - key: instance-type
          operator: Exists
          effect: NoSchedule

        # Git cache startup taint (we remove this after warm-up)
        - key: git-cache-not-ready
          operator: Exists
          effect: NoSchedule

        # GPU taints
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule

        # CPU architecture taints
        - key: cpu-type
          operator: Exists
          effect: NoSchedule

        # Karpenter default taints
        - key: karpenter.sh/unschedulable
          operator: Exists
          effect: NoSchedule

        # System taints
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/pid-pressure
          operator: Exists
          effect: NoSchedule

        - key: node.kubernetes.io/unschedulable
          operator: Exists
          effect: NoSchedule

      # Run on Karpenter-managed runner nodes and buildkit nodes
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - github-runner
                      - buildkit

      serviceAccountName: git-cache-warmer

      containers:
        - name: git-cache
          image: public.ecr.aws/docker/library/alpine:3.21
          command: ["/bin/sh", "/scripts/warm-cache.sh"]

          env:
            - name: FETCH_INTERVAL
              value: "60"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 4Gi

          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: host-mnt
              mountPath: /mnt

      volumes:
        - name: scripts
          configMap:
            name: git-cache-warmer-script
            defaultMode: 0755

        - name: host-mnt
          hostPath:
            path: /mnt
            type: Directory

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: git-cache-warmer
  namespace: kube-system
  labels:
    app: git-cache-warmer

---
# RBAC: Allow git-cache-warmer to read and patch nodes
# Required to remove the git-cache-not-ready startup taint after warm-up
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: git-cache-warmer
  labels:
    app: git-cache-warmer
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: git-cache-warmer
  labels:
    app: git-cache-warmer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: git-cache-warmer
subjects:
  - kind: ServiceAccount
    name: git-cache-warmer
    namespace: kube-system
