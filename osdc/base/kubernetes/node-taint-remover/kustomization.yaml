# NodeTaint Remover: shared Python library (ConfigMap) used by DaemonSets
# that need to remove their own startup taint at end-of-init.
#
# This component does NOT ship a DaemonSet of its own. The ConfigMap is
# generated by deploy.sh from lib/taint_remover.py to avoid drift; this
# kustomization exists to make the directory referenceable from the top-
# level base kustomization.yaml and to keep the namespace consistent.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kube-system

resources: []
