# DaemonSet script for the git cache warmer.
# Rsyncs from the central pod to local NVMe with dual-slot rotation,
# then removes the git-cache-not-ready startup taint.
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-cache-warmer-script
  namespace: kube-system
  labels:
    app: git-cache-warmer
data:
  daemonset.py: |
    #!/usr/bin/env python3
    """Git cache DaemonSet agent.

    Rsyncs the git cache from the central pod to local NVMe storage with
    dual-slot rotation (cache-a / cache-b). After the initial sync,
    removes the git-cache-not-ready startup taint from the node so that
    workflow job pods can schedule.

    Handles migration from the old single-directory layout: if /mnt/git-cache
    is a plain directory (not a symlink), its contents are moved into slot-a
    and replaced with a symlink.
    """

    import json
    import logging
    import os
    import shutil
    import socket
    import subprocess
    import sys
    import threading
    import time
    import urllib.request
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from pathlib import Path

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(message)s",
        datefmt="%Y-%m-%dT%H:%M:%S",
        stream=sys.stdout,
    )
    log = logging.getLogger("daemonset")

    # Mount points — /mnt is the host's /mnt via hostPath.
    # nodeadm's instanceStorePolicy: RAID0 mounts NVMe at /mnt/k8s-disks/0/.
    # Legacy nodes (or nodes without NVMe) use /mnt directly.
    _NODEADM_MNT = Path("/mnt/k8s-disks/0")
    # Use .resolve() so that if /mnt/k8s-disks/0 is a symlink to /mnt (BuildKit
    # legacy fallback), MNT resolves to /mnt and the compatibility symlink in
    # set_current() is correctly skipped (avoids circular symlinks).
    MNT = _NODEADM_MNT.resolve() if _NODEADM_MNT.exists() else Path("/mnt")
    SLOT_A = MNT / "git-cache-a"
    SLOT_B = MNT / "git-cache-b"
    CACHE_LINK = MNT / "git-cache"

    RSYNC_SOURCE = "rsync://git-cache-central.kube-system.svc.cluster.local/git-cache/"
    CENTRAL_HOST = "git-cache-central.kube-system.svc.cluster.local"
    CENTRAL_PORT = 873

    FETCH_INTERVAL = int(os.environ.get("FETCH_INTERVAL", "300"))
    TAINT_KEY = "git-cache-not-ready"
    NODE_NAME = os.environ.get("NODE_NAME", "")
    METRICS_PORT = 9102

    # Kubernetes API for taint removal
    K8S_API = "https://kubernetes.default.svc"
    TOKEN_PATH = Path("/var/run/secrets/kubernetes.io/serviceaccount/token")
    CA_PATH = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"


    # ---------------------------------------------------------------------------
    # Prometheus metrics server (stdlib only, no pip dependencies)
    # ---------------------------------------------------------------------------

    class MetricsServer:
        """Thread-safe Prometheus metrics with an HTTP endpoint on /metrics."""

        # Metric definitions: (name, type, help)
        _METRIC_DEFS = [
            ("git_cache_node_sync_duration_seconds", "gauge",
             "Duration of last rsync from central"),
            ("git_cache_node_sync_success_total", "counter",
             "Successful sync count"),
            ("git_cache_node_sync_errors_total", "counter",
             "Failed sync count"),
            ("git_cache_node_last_sync_timestamp", "gauge",
             "Unix timestamp of last successful sync"),
            ("git_cache_node_cache_age_seconds", "gauge",
             "Seconds since last successful sync"),
            ("git_cache_node_active_slot", "gauge",
             "Current active slot (0=a, 1=b)"),
            ("git_cache_node_initial_sync_duration_seconds", "gauge",
             "Time from pod start to first successful sync"),
            ("git_cache_node_taint_removed", "gauge",
             "1 if startup taint was successfully removed, 0 otherwise"),
            ("git_cache_node_central_wait_seconds", "gauge",
             "Time spent waiting for central rsyncd on startup"),
            ("git_cache_node_cache_size_bytes", "gauge",
             "Total size of the local git cache on disk"),
        ]

        def __init__(self) -> None:
            self._lock = threading.Lock()
            self._values: dict[str, float] = {}
            # Build a lookup for type/help by metric name
            self._types: dict[str, str] = {}
            self._helps: dict[str, str] = {}
            for name, mtype, mhelp in self._METRIC_DEFS:
                self._types[name] = mtype
                self._helps[name] = mhelp
                self._values[name] = 0.0

        def set(self, name: str, value: float) -> None:
            with self._lock:
                self._values[name] = value

        def inc(self, name: str, delta: float = 1.0) -> None:
            with self._lock:
                self._values[name] = self._values.get(name, 0.0) + delta

        def format(self) -> str:
            lines: list[str] = []
            with self._lock:
                snapshot = dict(self._values)
            for name, mtype, mhelp in self._METRIC_DEFS:
                value = snapshot.get(name, 0.0)
                # cache_age_seconds is computed dynamically
                if name == "git_cache_node_cache_age_seconds":
                    last_ts = snapshot.get(
                        "git_cache_node_last_sync_timestamp", 0.0
                    )
                    value = time.time() - last_ts if last_ts > 0 else 0.0
                lines.append(f"# HELP {name} {mhelp}")
                lines.append(f"# TYPE {name} {mtype}")
                lines.append(f"{name} {value}")
            lines.append("")  # trailing newline
            return "\n".join(lines)

        def start(self) -> None:
            """Start the HTTP server in a daemon thread."""
            metrics_ref = self

            class Handler(BaseHTTPRequestHandler):
                def do_GET(self) -> None:
                    if self.path == "/metrics":
                        body = metrics_ref.format().encode()
                        self.send_response(200)
                        self.send_header(
                            "Content-Type",
                            "text/plain; version=0.0.4; charset=utf-8",
                        )
                        self.send_header("Content-Length", str(len(body)))
                        self.end_headers()
                        self.wfile.write(body)
                    else:
                        self.send_response(404)
                        self.end_headers()

                def log_message(self, fmt, *args) -> None:  # noqa: ARG002
                    # Silence per-request access logs
                    pass

            server = HTTPServer(("0.0.0.0", METRICS_PORT), Handler)
            t = threading.Thread(target=server.serve_forever, daemon=True)
            t.start()
            log.info("Metrics server listening on :%d/metrics", METRICS_PORT)


    # Global metrics instance (initialised before main runs)
    metrics = MetricsServer()


    def _dir_size_bytes(path: Path) -> int:
        """Return total size in bytes of all files under path."""
        total = 0
        try:
            for f in path.rglob("*"):
                if f.is_file():
                    total += f.stat().st_size
        except OSError:
            pass
        return total


    def record_cache_size() -> None:
        """Measure and record the total size of the active git cache slot."""
        current = active_slot()
        if current is not None:
            size = _dir_size_bytes(current)
            metrics.set("git_cache_node_cache_size_bytes", size)
            log.info("Cache size: %.1f MiB", size / (1024 * 1024))


    def run(cmd: list[str], **kwargs) -> subprocess.CompletedProcess:
        """Run a command, logging it and raising on failure unless check=False."""
        log.info("$ %s", " ".join(cmd))
        kwargs.setdefault("check", True)
        return subprocess.run(cmd, **kwargs)


    def install_deps() -> None:
        """Install rsync via apk."""
        log.info("Installing dependencies...")
        run(["apk", "add", "--no-cache", "rsync"],
            stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)


    def wait_for_central(timeout: int = 600) -> None:
        """Wait for the central pod's rsyncd to accept TCP connections."""
        log.info("Waiting for central pod at %s:%d...", CENTRAL_HOST, CENTRAL_PORT)
        t0 = time.monotonic()
        deadline = t0 + timeout
        while time.monotonic() < deadline:
            try:
                sock = socket.create_connection((CENTRAL_HOST, CENTRAL_PORT), timeout=5)
                sock.close()
                log.info("Central pod is ready")
                metrics.set(
                    "git_cache_node_central_wait_seconds",
                    time.monotonic() - t0,
                )
                return
            except (socket.timeout, ConnectionRefusedError, OSError):
                time.sleep(5)
        metrics.set("git_cache_node_central_wait_seconds", time.monotonic() - t0)
        log.error("Central pod not ready after %ds, proceeding anyway", timeout)


    def active_slot() -> Path | None:
        """Return the currently active slot via the symlink, or None."""
        if CACHE_LINK.is_symlink():
            target = CACHE_LINK.resolve()
            if target == SLOT_A.resolve() or target == SLOT_B.resolve():
                return target
        return None


    def staging_slot() -> Path:
        """Return the slot NOT currently active."""
        current = active_slot()
        if current and current == SLOT_A.resolve():
            return SLOT_B
        return SLOT_A


    def set_current(slot: Path) -> None:
        """Atomically swap the /mnt/git-cache symlink to point to slot."""
        tmp_link = MNT / "git-cache.tmp"
        tmp_link.unlink(missing_ok=True)
        tmp_link.symlink_to(slot)
        tmp_link.rename(CACHE_LINK)
        log.info("Symlink %s -> %s", CACHE_LINK, slot)
        # When NVMe is at /mnt/k8s-disks/0/, runner pods still mount /mnt/git-cache
        # via hostPath. Create a top-level symlink so that path resolves.
        top_level_link = Path("/mnt/git-cache")
        if MNT != Path("/mnt") and not top_level_link.exists():
            top_level_link.symlink_to(CACHE_LINK)
            log.info("Created compatibility symlink: /mnt/git-cache -> %s", CACHE_LINK)
        metrics.set(
            "git_cache_node_active_slot",
            0.0 if slot.resolve() == SLOT_A.resolve() else 1.0,
        )


    def migrate_old_cache() -> None:
        """Migrate old single-directory cache to slot-a.

        If /mnt/git-cache is a plain directory (old layout), copy its
        contents into slot-a, then replace the directory with a symlink.
        Uses a two-phase approach: copy first, verify, then remove old dir.
        """
        if CACHE_LINK.is_symlink():
            return  # Already migrated
        if not CACHE_LINK.is_dir():
            return  # Nothing to migrate

        log.info("Migrating old cache directory to slot-a...")
        SLOT_A.mkdir(parents=True, exist_ok=True)

        # Phase 1: Copy old cache into slot-a (preserves original on failure)
        run(["rsync", "-a", f"{CACHE_LINK}/", f"{SLOT_A}/"])

        # Phase 2: Remove old directory and replace with symlink
        shutil.rmtree(CACHE_LINK)
        set_current(SLOT_A)
        log.info("Migration complete: /mnt/git-cache -> %s", SLOT_A)


    def rsync_from_central(dst: Path) -> bool:
        """Rsync from the central pod to a local slot. Returns True on success."""
        dst.mkdir(parents=True, exist_ok=True)
        t0 = time.monotonic()
        try:
            run(["rsync", "-a", "--delete", RSYNC_SOURCE, f"{dst}/"])
            duration = time.monotonic() - t0
            log.info("Rsynced from central -> %s", dst)
            metrics.set("git_cache_node_sync_duration_seconds", duration)
            metrics.inc("git_cache_node_sync_success_total")
            metrics.set("git_cache_node_last_sync_timestamp", time.time())
            return True
        except subprocess.CalledProcessError:
            duration = time.monotonic() - t0
            log.warning("Rsync from central failed")
            metrics.set("git_cache_node_sync_duration_seconds", duration)
            metrics.inc("git_cache_node_sync_errors_total")
            return False


    def remove_startup_taint() -> None:
        """Remove the git-cache-not-ready taint from this node via the K8s API.

        Uses JSON Patch (RFC 6902) to remove only our specific taint, avoiding
        race conditions with other taint managers (Karpenter, kubelet, etc.)
        that could occur with a merge patch replacing the entire taints array.
        """
        import ssl

        if not NODE_NAME:
            log.warning("NODE_NAME not set, cannot remove startup taint")
            return

        if not TOKEN_PATH.exists():
            log.warning("ServiceAccount token not found, cannot remove startup taint")
            return

        token = TOKEN_PATH.read_text().strip()
        ctx = ssl.create_default_context(cafile=CA_PATH)

        # Get current node state
        try:
            req = urllib.request.Request(
                f"{K8S_API}/api/v1/nodes/{NODE_NAME}",
                headers={"Authorization": f"Bearer {token}"},
            )
            with urllib.request.urlopen(req, context=ctx) as resp:
                node = json.loads(resp.read())
        except Exception as exc:
            log.warning("Failed to GET node %s: %s", NODE_NAME, exc)
            return

        taints = node.get("spec", {}).get("taints") or []

        # Find the index of our taint for a targeted JSON Patch removal
        taint_index = None
        for i, t in enumerate(taints):
            if t.get("key") == TAINT_KEY:
                taint_index = i
                break

        if taint_index is None:
            log.info("Startup taint already absent from %s", NODE_NAME)
            metrics.set("git_cache_node_taint_removed", 1.0)
            return

        # Use JSON Patch to remove only our taint by index — does not
        # interfere with taints added/removed by other controllers.
        patch_body = json.dumps([
            {"op": "test", "path": f"/spec/taints/{taint_index}/key",
             "value": TAINT_KEY},
            {"op": "remove", "path": f"/spec/taints/{taint_index}"},
        ]).encode()

        try:
            req = urllib.request.Request(
                f"{K8S_API}/api/v1/nodes/{NODE_NAME}",
                data=patch_body,
                headers={
                    "Authorization": f"Bearer {token}",
                    "Content-Type": "application/json-patch+json",
                },
                method="PATCH",
            )
            with urllib.request.urlopen(req, context=ctx) as resp:
                if resp.status == 200:
                    log.info("Removed %s taint from node %s", TAINT_KEY, NODE_NAME)
                    metrics.set("git_cache_node_taint_removed", 1.0)
                else:
                    log.warning("Failed to remove taint (HTTP %d)", resp.status)
        except Exception as exc:
            log.warning("Failed to PATCH node %s: %s", NODE_NAME, exc)


    def main() -> None:
        pod_start = time.monotonic()

        install_deps()

        # Start the Prometheus metrics endpoint early so liveness probes
        # and scrapers can reach it during the (potentially long) first sync.
        metrics.start()

        log.info("Node: %s", NODE_NAME or "unknown")
        log.info("Fetch interval: %ds", FETCH_INTERVAL)

        # Phase 1: Wait for central pod
        wait_for_central()

        # Phase 2: Handle migration from old layout
        migrate_old_cache()

        # Phase 3: Initial sync — retry until we have a valid cache.
        # Do NOT remove the startup taint until a successful sync, otherwise
        # runner pods schedule onto a node with an empty/broken cache.
        has_cache = active_slot() is not None
        if not has_cache:
            retry_delay = 30
            while True:
                dst = staging_slot()
                if rsync_from_central(dst):
                    set_current(dst)
                    record_cache_size()
                    has_cache = True
                    break
                log.warning(
                    "Initial sync failed, retrying in %ds...", retry_delay
                )
                time.sleep(retry_delay)
                retry_delay = min(retry_delay * 2, FETCH_INTERVAL)
        else:
            # Already have a cache (migration or previous run) — sync in background
            dst = staging_slot()
            if rsync_from_central(dst):
                set_current(dst)
                record_cache_size()

        # Record how long the initial sync took (pod start -> cache ready)
        metrics.set(
            "git_cache_node_initial_sync_duration_seconds",
            time.monotonic() - pod_start,
        )

        # Phase 4: Remove startup taint (only reached after successful sync)
        remove_startup_taint()

        # Phase 5: Periodic refresh loop
        while True:
            time.sleep(FETCH_INTERVAL)
            log.info("Starting periodic sync cycle...")

            dst = staging_slot()
            if rsync_from_central(dst):
                set_current(dst)
                record_cache_size()

            log.info("Sync cycle complete")


    if __name__ == "__main__":
        main()
