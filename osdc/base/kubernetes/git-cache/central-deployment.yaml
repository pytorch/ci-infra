# Central git cache pod. Clones from GitHub into EBS PVC and serves
# the cache via rsyncd (port 873) to DaemonSet pods on each node.
# Recreate strategy required because the EBS PVC is ReadWriteOnce.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: git-cache-central
  namespace: kube-system
  labels:
    app: git-cache-central
    app.kubernetes.io/name: git-cache-central
    app.kubernetes.io/component: git-cache
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: git-cache-central

  template:
    metadata:
      labels:
        app: git-cache-central

    spec:
      priorityClassName: system-cluster-critical

      # Run on base infrastructure nodes (EKS managed node group)
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule

      containers:
        - name: central
          image: public.ecr.aws/docker/library/python:3.12-alpine
          command: ["python3", "/scripts/central.py"]

          ports:
            - name: rsync
              containerPort: 873
              protocol: TCP
            - name: metrics
              containerPort: 9101
              protocol: TCP

          env:
            - name: FETCH_INTERVAL
              value: "300"

          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi

          readinessProbe:
            tcpSocket:
              port: 873
            initialDelaySeconds: 30
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 873
            initialDelaySeconds: 60
            periodSeconds: 30

          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config/rsyncd.conf
              subPath: rsyncd.conf
              readOnly: true
            - name: scripts
              mountPath: /scripts/central.py
              subPath: central.py
              readOnly: true

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: git-cache-central-data
        - name: config
          configMap:
            name: git-cache-central-config
        - name: scripts
          configMap:
            name: git-cache-central-config
            defaultMode: 0755
