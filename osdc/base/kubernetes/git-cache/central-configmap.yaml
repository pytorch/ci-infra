# Central git cache pod configuration.
# Contains the rsyncd config and the Python script that manages
# git clones on EBS and serves them via rsync to DaemonSet pods.
apiVersion: v1
kind: ConfigMap
metadata:
  name: git-cache-central-config
  namespace: kube-system
  labels:
    app: git-cache-central
data:
  rsyncd.conf: |
    uid = root
    gid = root
    use chroot = no
    max connections = 50
    timeout = 600
    read only = yes
    [git-cache]
    path = /data/current

  central.py: |
    #!/usr/bin/env python3
    """Central git cache manager.

    Clones repositories from GitHub into an EBS PVC with dual-slot rotation
    (cache-a / cache-b) and serves them via rsyncd on port 873.

    Slot rotation ensures DaemonSet rsync clients always read from a
    consistent snapshot while the central pod updates the other slot.
    """

    import logging
    import os
    import shutil
    import subprocess
    import sys
    import threading
    import time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    from pathlib import Path

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(message)s",
        datefmt="%Y-%m-%dT%H:%M:%S",
        stream=sys.stdout,
    )
    log = logging.getLogger("central")


    class MetricsServer:
        """Prometheus metrics server using stdlib http.server.

        Thread-safe metric updates via a lock. Serves /metrics on port 9101
        in Prometheus text exposition format.
        """

        METRICS_PORT = 9101

        # Metric definitions: (name, type, help)
        METRIC_DEFS = {
            "git_cache_central_fetch_duration_seconds": ("gauge", "Duration of last git fetch per repo"),
            "git_cache_central_fetch_success_total": ("counter", "Successful fetch count per repo"),
            "git_cache_central_fetch_errors_total": ("counter", "Failed fetch count per repo"),
            "git_cache_central_last_fetch_timestamp": ("gauge", "Unix timestamp of last successful fetch"),
            "git_cache_central_repo_size_bytes": ("gauge", "Size of each repo cache on disk"),
            "git_cache_central_slot_swaps_total": ("counter", "Number of active-slot rotations"),
            "git_cache_central_active_slot": ("gauge", "Current active slot (0=a, 1=b)"),
            "git_cache_central_cycle_duration_seconds": ("gauge", "Duration of last full update cycle"),
            "git_cache_central_rsyncd_restarts_total": ("counter", "rsyncd daemon restart count"),
            "git_cache_central_repos_total": ("gauge", "Number of repos being cached"),
            "git_cache_central_clone_total": ("counter", "Total clone/fetch operations"),
            "git_cache_central_clone_duration_seconds": ("histogram", "Time to clone/fetch each repo"),
            "git_cache_central_last_success_timestamp": ("gauge", "Unix timestamp of last successful sync per repo"),
        }

        # Histogram bucket boundaries (seconds) for clone/fetch duration
        HISTOGRAM_BUCKETS = (1.0, 5.0, 10.0, 30.0, 60.0, 120.0, 300.0, 600.0, float("inf"))

        def __init__(self) -> None:
            self._lock = threading.Lock()
            # Keyed by (metric_name, frozenset(label_pairs))
            self._values: dict[tuple[str, frozenset], float] = {}
            # Histogram data: keyed by (metric_name, frozenset(label_pairs))
            # Each value is {"buckets": {le: count}, "sum": float, "count": int}
            self._histograms: dict[tuple[str, frozenset], dict] = {}

        def set(self, name: str, value: float, labels: dict[str, str] | None = None) -> None:
            """Set a gauge metric value."""
            key = (name, frozenset((labels or {}).items()))
            with self._lock:
                self._values[key] = value

        def inc(self, name: str, labels: dict[str, str] | None = None, amount: float = 1) -> None:
            """Increment a counter metric."""
            key = (name, frozenset((labels or {}).items()))
            with self._lock:
                self._values[key] = self._values.get(key, 0) + amount

        def observe(self, name: str, value: float, labels: dict[str, str] | None = None) -> None:
            """Record an observation in a histogram metric.

            Stores per-bucket counts (non-cumulative). The format_metrics
            method accumulates them into cumulative counts for output.
            """
            key = (name, frozenset((labels or {}).items()))
            with self._lock:
                if key not in self._histograms:
                    self._histograms[key] = {
                        "buckets": {le: 0 for le in self.HISTOGRAM_BUCKETS},
                        "sum": 0.0,
                        "count": 0,
                    }
                h = self._histograms[key]
                # Increment only the smallest bucket that fits the value
                for le in sorted(self.HISTOGRAM_BUCKETS):
                    if value <= le:
                        h["buckets"][le] += 1
                        break
                h["sum"] += value
                h["count"] += 1

        def _format_label_str(self, labels_dict: dict[str, str]) -> str:
            """Format a dict of labels into Prometheus label string."""
            if not labels_dict:
                return ""
            return "{" + ",".join(
                f'{k}="{v}"' for k, v in sorted(labels_dict.items())
            ) + "}"

        def format_metrics(self) -> str:
            """Format all metrics in Prometheus text exposition format."""
            with self._lock:
                snapshot = dict(self._values)
                hist_snapshot = {k: {
                    "buckets": dict(v["buckets"]),
                    "sum": v["sum"],
                    "count": v["count"],
                } for k, v in self._histograms.items()}

            # Group gauge/counter values by metric name
            by_name: dict[str, list[tuple[frozenset, float]]] = {}
            for (name, label_set), value in snapshot.items():
                by_name.setdefault(name, []).append((label_set, value))

            # Group histogram values by metric name
            hist_by_name: dict[str, list[tuple[frozenset, dict]]] = {}
            for (name, label_set), hdata in hist_snapshot.items():
                hist_by_name.setdefault(name, []).append((label_set, hdata))

            # Collect all metric names for sorted output
            all_names = sorted(set(list(by_name.keys()) + list(hist_by_name.keys())))

            lines: list[str] = []
            for name in all_names:
                mtype, help_text = self.METRIC_DEFS.get(name, ("untyped", ""))
                lines.append(f"# HELP {name} {help_text}")
                lines.append(f"# TYPE {name} {mtype}")

                if name in hist_by_name:
                    # Render histogram with _bucket, _sum, _count lines
                    for label_set, hdata in sorted(hist_by_name[name]):
                        base_labels = dict(label_set)
                        cumulative = 0
                        for le in sorted(b for b in hdata["buckets"] if b != float("inf")):
                            cumulative += hdata["buckets"][le]
                            le_labels = {**base_labels, "le": str(le)}
                            lines.append(f"{name}_bucket{self._format_label_str(le_labels)} {cumulative}")
                        # +Inf bucket
                        cumulative += hdata["buckets"].get(float("inf"), 0)
                        inf_labels = {**base_labels, "le": "+Inf"}
                        lines.append(f"{name}_bucket{self._format_label_str(inf_labels)} {cumulative}")
                        # _sum and _count
                        base_lstr = self._format_label_str(base_labels)
                        lines.append(f"{name}_sum{base_lstr} {hdata['sum']}")
                        lines.append(f"{name}_count{base_lstr} {hdata['count']}")
                else:
                    # Render gauge/counter
                    for label_set, value in sorted(by_name.get(name, [])):
                        labels_dict = dict(label_set)
                        if labels_dict:
                            label_str = ",".join(
                                f'{k}="{v}"' for k, v in sorted(labels_dict.items())
                            )
                            lines.append(f"{name}{{{label_str}}} {value}")
                        else:
                            lines.append(f"{name} {value}")
            lines.append("")
            return "\n".join(lines)

        def start(self) -> None:
            """Start the HTTP metrics server in a daemon thread."""
            server_ref = self

            class Handler(BaseHTTPRequestHandler):
                def do_GET(self) -> None:
                    if self.path == "/metrics":
                        body = server_ref.format_metrics().encode()
                        self.send_response(200)
                        self.send_header("Content-Type", "text/plain; version=0.0.4; charset=utf-8")
                        self.send_header("Content-Length", str(len(body)))
                        self.end_headers()
                        self.wfile.write(body)
                    else:
                        self.send_response(404)
                        self.end_headers()

                def log_message(self, format: str, *args: object) -> None:
                    # Suppress default access logs to avoid noise
                    pass

            httpd = HTTPServer(("", self.METRICS_PORT), Handler)
            thread = threading.Thread(target=httpd.serve_forever, daemon=True)
            thread.start()
            log.info("Metrics server started on port %d", self.METRICS_PORT)


    metrics = MetricsServer()

    DATA_DIR = Path("/data")
    SLOT_A = DATA_DIR / "cache-a"
    SLOT_B = DATA_DIR / "cache-b"
    CURRENT_LINK = DATA_DIR / "current"
    RSYNCD_CONF = Path("/config/rsyncd.conf")
    FETCH_INTERVAL = int(os.environ.get("FETCH_INTERVAL", "300"))

    # Repos with submodules — cloned non-bare with --recurse-submodules.
    # The checkout action needs .git/modules/<name>/objects/ to resolve
    # submodule alternates via submodule.alternateLocation=superproject.
    REPOS_FULL = [
        "pytorch/pytorch",
    ]

    # Repos without submodules — cloned bare (lightweight).
    REPOS_BARE = [
        "pytorch/test-infra",
    ]


    def run(cmd: list[str], **kwargs) -> subprocess.CompletedProcess:
        """Run a command, logging it and raising on failure unless check=False."""
        log.info("$ %s", " ".join(cmd))
        kwargs.setdefault("check", True)
        return subprocess.run(cmd, **kwargs)


    def install_deps() -> None:
        """Install git and rsync via apk."""
        log.info("Installing dependencies...")
        run(["apk", "add", "--no-cache", "git", "rsync"],
            stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
        result = run(["git", "--version"], capture_output=True, text=True)
        log.info("Git version: %s", result.stdout.strip())


    def active_slot() -> Path | None:
        """Return the currently active slot, or None if no valid link."""
        if CURRENT_LINK.is_symlink():
            target = CURRENT_LINK.resolve()
            if target == SLOT_A.resolve() or target == SLOT_B.resolve():
                return target
        return None


    def staging_slot() -> Path:
        """Return the slot NOT currently active (for updates)."""
        current = active_slot()
        if current and current == SLOT_A.resolve():
            return SLOT_B
        return SLOT_A


    def slot_is_valid(slot: Path) -> bool:
        """Check if a slot contains a populated cache."""
        # Check for at least one full or bare repo
        for repo in REPOS_FULL:
            org, name = repo.split("/")
            if (slot / org / name / ".git").is_dir():
                return True
        for repo in REPOS_BARE:
            org, name = repo.split("/")
            if (slot / org / f"{name}.git" / "objects").is_dir():
                return True
        return False


    def write_gitconfig(slot: Path) -> None:
        """Write .gitconfig with safe.directory=* for job pods."""
        gitconfig = slot / ".gitconfig"
        gitconfig.write_text("[safe]\n\tdirectory = *\n")
        log.info("Wrote %s", gitconfig)


    def clone_full_repo(slot: Path, repo: str) -> None:
        """Clone a repo with submodules into the slot."""
        org, name = repo.split("/")
        repo_dir = slot / org / name
        if (repo_dir / ".git").is_dir():
            log.info("Already cloned: %s", repo)
            return

        log.info("Cloning %s with submodules...", repo)
        (slot / org).mkdir(parents=True, exist_ok=True)
        for attempt in range(1, 4):
            try:
                run(["git", "clone", "--recurse-submodules", "--jobs=4",
                     f"https://github.com/{repo}.git", str(repo_dir)])
                log.info("Cloned %s (attempt %d)", repo, attempt)
                return
            except subprocess.CalledProcessError:
                log.warning("Clone attempt %d/3 failed for %s", attempt, repo)
                if repo_dir.exists():
                    shutil.rmtree(repo_dir)
                if attempt < 3:
                    time.sleep(10)
        log.error("Failed to clone %s after 3 attempts", repo)


    def clone_bare_repo(slot: Path, repo: str) -> None:
        """Clone a repo as a bare repo into the slot."""
        org, name = repo.split("/")
        repo_dir = slot / org / f"{name}.git"
        if (repo_dir / "objects").is_dir() and _bare_has_refs(repo_dir):
            log.info("Already cloned: %s (bare)", repo)
            return

        log.info("Cloning %s (bare)...", repo)
        (slot / org).mkdir(parents=True, exist_ok=True)
        if not (repo_dir / "objects").is_dir():
            run(["git", "init", "--bare", str(repo_dir)],
                stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
            run(["git", "-C", str(repo_dir), "remote", "add", "origin",
                 f"https://github.com/{repo}.git"], check=False)

        for attempt in range(1, 4):
            try:
                run(["git", "-C", str(repo_dir), "fetch", "origin"])
                log.info("Fetched %s (bare, attempt %d)", repo, attempt)
                return
            except subprocess.CalledProcessError:
                log.warning("Fetch attempt %d/3 failed for %s", attempt, repo)
                if attempt < 3:
                    time.sleep(10)
        log.error("Failed to fetch %s after 3 attempts", repo)


    def _bare_has_refs(repo_dir: Path) -> bool:
        """Check if a bare repo has any refs."""
        result = subprocess.run(
            ["git", "-C", str(repo_dir), "show-ref", "--quiet"],
            capture_output=True,
        )
        return result.returncode == 0


    def _dir_size_bytes(path: Path) -> int:
        """Return total size in bytes of all files under path."""
        total = 0
        try:
            for f in path.rglob("*"):
                if f.is_file():
                    total += f.stat().st_size
        except OSError:
            pass
        return total


    def _record_repo_size(slot: Path, repo: str, bare: bool) -> None:
        """Record the on-disk size of a repo in metrics."""
        org, name = repo.split("/")
        if bare:
            repo_dir = slot / org / f"{name}.git"
        else:
            repo_dir = slot / org / name
        if repo_dir.exists():
            size = _dir_size_bytes(repo_dir)
            metrics.set("git_cache_central_repo_size_bytes", size, {"repo": repo})


    def populate_slot(slot: Path) -> None:
        """Clone all repos into a slot."""
        slot.mkdir(parents=True, exist_ok=True)
        for repo in REPOS_FULL:
            clone_full_repo(slot, repo)
        for repo in REPOS_BARE:
            clone_bare_repo(slot, repo)
        write_gitconfig(slot)


    def set_current(slot: Path) -> None:
        """Atomically swap the /data/current symlink to point to slot."""
        tmp_link = DATA_DIR / "current.tmp"
        tmp_link.unlink(missing_ok=True)
        tmp_link.symlink_to(slot)
        tmp_link.rename(CURRENT_LINK)
        metrics.inc("git_cache_central_slot_swaps_total")
        slot_value = 0 if slot.resolve() == SLOT_A.resolve() else 1
        metrics.set("git_cache_central_active_slot", slot_value)
        log.info("Symlink /data/current -> %s", slot)


    def fetch_full_repo(repo_dir: Path, repo: str) -> None:
        """Fetch updates for a full (non-bare) repo with submodules."""
        if not (repo_dir / ".git").is_dir():
            return
        labels = {"repo": repo}
        t0 = time.monotonic()
        try:
            run(["git", "-C", str(repo_dir), "fetch", "origin",
                 "--prune", "--tags"])
            log.info("Fetched %s", repo)
        except subprocess.CalledProcessError:
            duration = time.monotonic() - t0
            metrics.set("git_cache_central_fetch_duration_seconds", duration, labels)
            metrics.inc("git_cache_central_fetch_errors_total", labels)
            metrics.inc("git_cache_central_clone_total", {"repo": repo, "status": "error"})
            metrics.observe("git_cache_central_clone_duration_seconds", duration, labels)
            log.warning("Fetch failed for %s (will retry next cycle)", repo)
            return

        try:
            run(["git", "-C", str(repo_dir), "submodule", "update",
                 "--init", "--recursive", "--jobs=4"])
            log.info("Updated submodules for %s", repo)
        except subprocess.CalledProcessError:
            log.warning("Submodule update failed for %s (will retry next cycle)", repo)

        duration = time.monotonic() - t0
        now = time.time()
        metrics.set("git_cache_central_fetch_duration_seconds", duration, labels)
        metrics.inc("git_cache_central_fetch_success_total", labels)
        metrics.set("git_cache_central_last_fetch_timestamp", now, labels)
        metrics.inc("git_cache_central_clone_total", {"repo": repo, "status": "success"})
        metrics.observe("git_cache_central_clone_duration_seconds", duration, labels)
        metrics.set("git_cache_central_last_success_timestamp", now, labels)


    def fetch_bare_repo_update(repo_dir: Path, repo: str) -> None:
        """Fetch updates for a bare repo."""
        if not (repo_dir / "objects").is_dir():
            return
        labels = {"repo": repo}
        t0 = time.monotonic()
        try:
            run(["git", "-C", str(repo_dir), "fetch", "origin",
                 "--prune", "--tags"])
            duration = time.monotonic() - t0
            now = time.time()
            metrics.set("git_cache_central_fetch_duration_seconds", duration, labels)
            metrics.inc("git_cache_central_fetch_success_total", labels)
            metrics.set("git_cache_central_last_fetch_timestamp", now, labels)
            metrics.inc("git_cache_central_clone_total", {"repo": repo, "status": "success"})
            metrics.observe("git_cache_central_clone_duration_seconds", duration, labels)
            metrics.set("git_cache_central_last_success_timestamp", now, labels)
            log.info("Fetched %s", repo)
        except subprocess.CalledProcessError:
            duration = time.monotonic() - t0
            metrics.set("git_cache_central_fetch_duration_seconds", duration, labels)
            metrics.inc("git_cache_central_fetch_errors_total", labels)
            metrics.inc("git_cache_central_clone_total", {"repo": repo, "status": "error"})
            metrics.observe("git_cache_central_clone_duration_seconds", duration, labels)
            log.warning("Fetch failed for %s (will retry next cycle)", repo)


    def rsync_slot(src: Path, dst: Path) -> None:
        """Rsync from src slot to dst slot (local copy)."""
        dst.mkdir(parents=True, exist_ok=True)
        run(["rsync", "-a", "--delete", f"{src}/", f"{dst}/"])
        log.info("Rsynced %s -> %s", src, dst)


    def start_rsyncd() -> subprocess.Popen:
        """Start rsync daemon in the background."""
        log.info("Starting rsyncd on port 873...")
        # stdout/stderr inherit from parent so rsyncd logs appear in kubectl logs.
        # Do NOT use subprocess.PIPE — nobody reads it, so the 64KB pipe buffer
        # fills and rsyncd blocks (deadlock).
        proc = subprocess.Popen(
            ["rsync", "--daemon", "--no-detach", f"--config={RSYNCD_CONF}"],
        )
        log.info("rsyncd started (pid %d)", proc.pid)
        return proc


    def main() -> None:
        install_deps()

        # Start metrics server early so it's available during initial clone
        metrics.start()

        # Record total number of repos being cached
        metrics.set("git_cache_central_repos_total", len(REPOS_FULL) + len(REPOS_BARE))

        log.info("Data directory: %s", DATA_DIR)
        log.info("Fetch interval: %ds", FETCH_INTERVAL)

        # Phase 1: Ensure we have a valid active slot
        current = active_slot()
        if current and slot_is_valid(current):
            log.info("Existing cache found at %s", current)
        else:
            # No valid cache — clone from GitHub into slot-a
            log.info("No valid cache found, cloning from GitHub...")
            populate_slot(SLOT_A)
            set_current(SLOT_A)

        # Phase 2: Start rsyncd to serve the cache
        rsyncd = start_rsyncd()

        # Phase 3: Periodic update loop
        # Rsync active -> staging, git fetch in staging, swap symlink
        while True:
            time.sleep(FETCH_INTERVAL)
            cycle_start = time.monotonic()
            log.info("Starting periodic update cycle...")

            # Check rsyncd is still alive
            if rsyncd.poll() is not None:
                log.warning("rsyncd died (rc=%d), restarting...", rsyncd.returncode)
                metrics.inc("git_cache_central_rsyncd_restarts_total")
                rsyncd = start_rsyncd()

            src = active_slot() or SLOT_A
            dst = staging_slot()

            # Copy current -> staging
            rsync_slot(src, dst)

            # Fetch updates in staging slot
            for repo in REPOS_FULL:
                org, name = repo.split("/")
                repo_dir = dst / org / name
                if (repo_dir / ".git").is_dir():
                    fetch_full_repo(repo_dir, repo)
                else:
                    clone_full_repo(dst, repo)
                _record_repo_size(dst, repo, bare=False)

            for repo in REPOS_BARE:
                org, name = repo.split("/")
                repo_dir = dst / org / f"{name}.git"
                if (repo_dir / "objects").is_dir():
                    fetch_bare_repo_update(repo_dir, repo)
                else:
                    clone_bare_repo(dst, repo)
                _record_repo_size(dst, repo, bare=True)

            write_gitconfig(dst)

            # Atomic swap
            set_current(dst)
            metrics.set("git_cache_central_cycle_duration_seconds", time.monotonic() - cycle_start)
            log.info("Update cycle complete — active slot: %s", dst)


    if __name__ == "__main__":
        main()
