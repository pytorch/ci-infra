# Base Kubernetes resources applied to EVERY cluster.
# These are cluster-agnostic and required regardless of which modules are enabled.
#
# Module-specific resources belong in osdc/<module>/kubernetes/ instead.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - osdc-system-namespace.yaml
  - storageclass-gp3.yaml
  - node-performance-tuning.yaml
  - nvidia-device-plugin.yaml
  - harbor-namespace.yaml
  - registry-mirror-config.yaml
  - algif-mitigation.yaml
  - dirtyfrag-mitigation.yaml
  # node-taint-remover ships only a ConfigMap (generated at apply time from
  # lib/taint_remover.py to avoid drift). Its kustomization.yaml is a
  # placeholder; deploy.sh in deploy-base does the actual ConfigMap apply
  # before consuming DaemonSets (cache-enforcer, registry-mirror-config,
  # node-performance-tuning) are restarted.
  # image-cache-janitor is deployed via its own deploy.sh (builds custom image)
  # nodelocaldns is deployed via its own deploy.sh (resolves kube-dns ClusterIP at apply time)
  # NOTE: Namespaces for modules (arc-runners, arc-systems, buildkit, etc.)
  # are created by the module's own kubernetes/ directory, not here.
