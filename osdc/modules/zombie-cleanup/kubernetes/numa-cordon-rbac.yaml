apiVersion: v1
kind: ServiceAccount
metadata:
  name: numa-cordon
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: numa-cordon
    app.kubernetes.io/part-of: osdc-zombie-cleanup
---
# Namespace-scoped: list/delete Failed pods in arc-runners.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: numa-cordon
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: numa-cordon
    app.kubernetes.io/part-of: osdc-zombie-cleanup
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: numa-cordon
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: numa-cordon
    app.kubernetes.io/part-of: osdc-zombie-cleanup
subjects:
  - kind: ServiceAccount
    name: numa-cordon
    namespace: arc-runners
roleRef:
  kind: Role
  name: numa-cordon
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped: get/list/patch nodes for cordon/uncordon.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: numa-cordon
  labels:
    app.kubernetes.io/name: numa-cordon
    app.kubernetes.io/part-of: osdc-zombie-cleanup
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: numa-cordon
  labels:
    app.kubernetes.io/name: numa-cordon
    app.kubernetes.io/part-of: osdc-zombie-cleanup
subjects:
  - kind: ServiceAccount
    name: numa-cordon
    namespace: arc-runners
roleRef:
  kind: ClusterRole
  name: numa-cordon
  apiGroup: rbac.authorization.k8s.io
