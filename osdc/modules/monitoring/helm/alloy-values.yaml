# Grafana Alloy Helm values for OSDC.
#
# Alloy pushes metrics to Grafana Cloud by independently discovering
# ServiceMonitor/PodMonitor CRDs and scraping the same targets as Prometheus.
# Only installed when the grafana-cloud-credentials secret exists.
#
# Dynamic values (GCLOUD_RW_URL, CLUSTER_NAME) are injected by deploy.sh
# via a temporary override file.

controller:
  type: deployment
  replicas: 2

  # Run on base infrastructure nodes
  nodeSelector:
    role: base-infrastructure
  tolerations:
    - key: CriticalAddonsOnly
      operator: Equal
      value: "true"
      effect: NoSchedule

alloy:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  configMap:
    content: |-
      // Discover and scrape all ServiceMonitor targets across namespaces.
      prometheus.operator.servicemonitors "default" {
        forward_to = [prometheus.relabel.cost_control.receiver]
        clustering {
          enabled = true
        }
      }

      // Discover and scrape all PodMonitor targets across namespaces.
      prometheus.operator.podmonitors "default" {
        forward_to = [prometheus.relabel.cost_control.receiver]
        clustering {
          enabled = true
        }
      }

      // Drop high-cardinality and low-value metrics before remote_write.
      // Most filtering is done at ServiceMonitor level (keep whitelists).
      // These rules catch anything that slips through from sources without per-monitor filtering.
      prometheus.relabel "cost_control" {
        forward_to = [prometheus.remote_write.grafana_cloud.receiver]

        // --- KSM: drop low-value metrics ---
        rule {
          action        = "drop"
          source_labels = ["__name__"]
          regex         = "kube_.*_created|kube_.*_metadata_resource_version|kube_secret_.*|kube_configmap_.*|kube_endpoint_.*|kube_lease_.*"
        }

        // --- drop misc high-cardinality metrics ---
        rule {
          action        = "drop"
          source_labels = ["__name__"]
          regex         = "kubernetes_feature_enabled"
        }

        // --- ARC histogram buckets (keep sum/count) ---
        rule {
          action        = "drop"
          source_labels = ["__name__"]
          regex         = "gha_job_(execution|startup)_duration_seconds_bucket"
        }

        // --- go/process/promhttp/prometheus_operator internals from any source ---
        rule {
          action        = "drop"
          source_labels = ["__name__"]
          regex         = "go_.*|process_.*|promhttp_.*|prometheus_operator_.*"
        }
      }

      // Sync PrometheusRule CRDs to Grafana Cloud Managed Alerts.
      // Without this, PrometheusRule CRDs are inert (no local Prometheus).
      mimir.rules.kubernetes "grafana_cloud" {
        address  = env("GCLOUD_BASE_URL")
        tenant_id = env("GCLOUD_RW_API_USER")

        basic_auth {
          username = env("GCLOUD_RW_API_USER")
          password = env("GCLOUD_RW_API_KEY")
        }
      }

      // Push metrics to Grafana Cloud Mimir.
      prometheus.remote_write "grafana_cloud" {
        external_labels = {
          cluster = env("CLUSTER_NAME"),
        }
        endpoint {
          url = env("GCLOUD_RW_URL")
          basic_auth {
            username = env("GCLOUD_RW_API_USER")
            password = env("GCLOUD_RW_API_KEY")
          }
        }
      }
