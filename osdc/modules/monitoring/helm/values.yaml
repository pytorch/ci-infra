# kube-prometheus-stack Helm values for OSDC.
#
# This chart is used ONLY as a CRD + exporter provider:
#   - Installs monitoring.coreos.com CRDs (ServiceMonitor, PodMonitor, etc.)
#   - Runs node-exporter and kube-state-metrics to expose system metrics
#   - Runs Prometheus Operator to manage CRD lifecycle
#
# Prometheus, Grafana, and AlertManager are DISABLED.
# Metrics collection and push is handled by Grafana Alloy (see alloy-values.yaml).

# --- Prometheus (DISABLED — Alloy handles scraping + push) ---
prometheus:
  enabled: false

# --- Control plane ServiceMonitors (DISABLED — we manage our own) ---
# kube-prometheus-stack creates ServiceMonitors for these by default.
# We disable them all and use custom monitors in kubernetes/monitors/
# for the components we actually want (apiserver, coredns).
# EKS does not expose controller-manager, scheduler, or etcd endpoints.
kubeApiServer:
  enabled: false
coreDns:
  enabled: false
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeEtcd:
  enabled: false

# --- kubelet + cadvisor ServiceMonitor ---
kubelet:
  enabled: true
  serviceMonitor:
    # Disable /metrics/probes scraping — generates ~1440 high-cardinality
    # prober_probe_duration_seconds_bucket series with no alerting value
    probes: false
    # cadvisor: keep only pod-level memory metrics (per pod/container series)
    # - container_memory_working_set_bytes: active memory used by pod; K8s uses this for OOM kill decisions
    # - container_memory_rss: physical memory (no cache); useful for spotting memory leaks
    # NOTE: these generate one series per container, so high pod churn (e.g. runners) increases cardinality
    cAdvisorMetricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: "container_memory_working_set_bytes|container_memory_rss"
    # kubelet: keep only running pod/container counts
    metricRelabelings:
      - action: keep
        sourceLabels: [__name__]
        regex: "kubelet_running_(pods|containers)|kubelet_node_name"

# --- Grafana (DISABLED — use Grafana Cloud) ---
grafana:
  enabled: false

# --- AlertManager (DISABLED — use Grafana Cloud alerting) ---
alertmanager:
  enabled: false

# --- node-exporter (DaemonSet — runs on ALL nodes) ---
nodeExporter:
  tolerations:
    - operator: Exists  # tolerate ALL taints — must run on every node

# --- node-exporter subchart overrides ---
prometheus-node-exporter:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 50
  extraArgs:
    - --no-collector.bcache
    - --no-collector.bonding
    - --no-collector.infiniband
    - --no-collector.nfs
    - --no-collector.nfsd
    - --no-collector.fibrechannel
    - --no-collector.ipvs
    - --no-collector.rapl
    - --no-collector.schedstat
    - --no-collector.interrupts
    - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker|var/lib/kubelet|run/containerd)($|/)
    - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|cgroup|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|mqueue|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|sysfs|tracefs|tmpfs)$
    - --collector.netdev.device-exclude=^(veth|cali|flannel|cni|docker|br-).*
  prometheus:
    monitor:
      interval: 60s
      metricRelabelings:
        # Keep only CPU (idle/iowait) and memory — drop everything else
        - action: keep
          sourceLabels: [__name__]
          regex: "node_cpu_seconds_total|node_memory_MemAvailable_bytes|node_memory_MemTotal_bytes"
        - action: drop
          sourceLabels: [__name__, mode]
          regex: "node_cpu_seconds_total;(user|system|nice|irq|softirq|steal)"

# --- kube-state-metrics ---
kube-state-metrics:
  extraArgs:
    - --metric-allowlist=kube_(daemonset|deployment|pod|namespace|node|statefulset|persistentvolume|horizontalpodautoscaler|job)_.+
  prometheus:
    monitor:
      metricRelabelings:
        # Drop all kube_pod_* except error indicators and pod info.
        # kube_pod_info provides the `node` label needed to correlate pod failures
        # with specific nodes — enables detecting bad nodes that fail runner jobs
        # repeatedly (join exitcode/reason metrics with kube_pod_info by node).
        - action: drop
          sourceLabels: [__name__]
          regex: "kube_pod_(?!container_status_last_terminated_reason|container_status_last_terminated_exitcode|status_reason|info).*"
        # Drop low-value node metrics
        - action: drop
          sourceLabels: [__name__]
          regex: "kube_node_status_addresses"
        # Drop successful terminations (only keep actual errors)
        - action: drop
          sourceLabels: [__name__, reason]
          regex: "kube_pod_container_status_last_terminated_reason;Completed"
        - action: drop
          sourceLabels: [__name__, container_exit_code]
          regex: "kube_pod_container_status_last_terminated_exitcode;0"
  tolerations:
    - key: CriticalAddonsOnly
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    role: base-infrastructure

# --- Prometheus Operator (manages CRD lifecycle) ---
prometheusOperator:
  tolerations:
    - key: CriticalAddonsOnly
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    role: base-infrastructure
  # Admission webhook (pre-install/pre-upgrade hook jobs)
  admissionWebhooks:
    patch:
      tolerations:
        - key: CriticalAddonsOnly
          operator: Equal
          value: "true"
          effect: NoSchedule
      nodeSelector:
        role: base-infrastructure
