apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: karpenter
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: osdc-monitoring
spec:
  namespaceSelector:
    matchNames:
      - karpenter
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter
  endpoints:
    - port: http-metrics
      interval: 30s
      metricRelabelings:
        # Keep only node/nodepool/nodeclaim lifecycle and interruption metrics
        - action: keep
          sourceLabels: [__name__]
          regex: "karpenter_nodes_.*|karpenter_nodepools_.*|karpenter_nodeclaims_.*|karpenter_interruption_.*"
