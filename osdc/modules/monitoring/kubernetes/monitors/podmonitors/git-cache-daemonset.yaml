apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: git-cache-daemonset
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: osdc-monitoring
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  selector:
    matchLabels:
      app: git-cache-warmer
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
