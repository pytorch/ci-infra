apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# CRD-dependent resources — applied by deploy.sh AFTER kube-prometheus-stack
# installs the monitoring.coreos.com CRDs (ServiceMonitor, PodMonitor).

resources:
  # ServiceMonitors
  - ../servicemonitors/arc-controller.yaml
  - ../servicemonitors/harbor.yaml
  - ../servicemonitors/karpenter.yaml
  - ../servicemonitors/node-compactor.yaml
  - ../servicemonitors/git-cache-central.yaml
  # PodMonitors
  - ../podmonitors/git-cache-daemonset.yaml
  - ../podmonitors/arc-listeners.yaml
  # DCGM ServiceMonitor (the DaemonSet itself is in the parent kustomization)
  - ../dcgm-exporter/servicemonitor.yaml
