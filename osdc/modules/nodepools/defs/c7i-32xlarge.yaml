# Karpenter NodePool definition: c7i.32xlarge
# Compute-optimized pool for AMX/AVX2 runners with ~2 GiB/core ratio
# Intel Sapphire Rapids — required for AMX instruction set
# Node disk: worst case 14x 150Gi pods + 100Gi OS = 2200Gi
nodepool:
  name: c7i-32xlarge
  instance_type: c7i.32xlarge
  arch: amd64
  node_disk_size: 2200
  gpu: false
