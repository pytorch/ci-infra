# Karpenter NodePool definition: g5.48xlarge
# Consolidated pool for GPU G5 workloads
# Node disk: 100Gi OS + 500Gi images = 600Gi — NVMe instance storage handles container data
nodepool:
  name: g5-48xlarge
  instance_type: g5.48xlarge
  arch: amd64
  node_disk_size: 600
  gpu: true
  has_nvme: true
