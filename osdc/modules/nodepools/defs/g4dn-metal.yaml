# Karpenter NodePool definition: g4dn.metal
# Only for 8xT4 GPU workloads (no non-metal alternative with 8 GPUs)
# Node disk: 100Gi OS + 500Gi images = 600Gi — NVMe instance storage handles container data
nodepool:
  name: g4dn-metal
  instance_type: g4dn.metal
  arch: amd64
  node_disk_size: 600
  gpu: true
  has_nvme: true
  baremetal: true
