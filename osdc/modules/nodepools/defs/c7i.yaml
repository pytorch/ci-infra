# Karpenter NodePool fleet: c7i
# Intel Sapphire Rapids — compute-optimized, AMX/AVX-512, ~2 GiB/core ratio
fleet:
  name: c7i
  arch: amd64
  gpu: false
  instances:
    - type: c7i.48xlarge
      weight: 100
      node_disk_size: 3750
    - type: c7i.24xlarge
      weight: 85
      node_disk_size: 1900
    - type: c7i.metal-24xl
      weight: 84
      node_disk_size: 800
      baremetal: true
    - type: c7i.16xlarge
      weight: 60
      node_disk_size: 1300
    - type: c7i.12xlarge
      weight: 40
      node_disk_size: 1350
    - type: c7i.8xlarge
      weight: 20
      node_disk_size: 650
