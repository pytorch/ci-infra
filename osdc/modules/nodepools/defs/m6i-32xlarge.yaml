# Karpenter NodePool definition: m6i.32xlarge
# Balanced pool for AVX-512 runners with ~4 GiB/core ratio
# Intel Ice Lake — AVX-512 support
# Node disk: worst case 1x 200Gi pod + 100Gi OS + 500Gi images = 800Gi
nodepool:
  name: m6i-32xlarge
  instance_type: m6i.32xlarge
  arch: amd64
  node_disk_size: 800
  gpu: false
