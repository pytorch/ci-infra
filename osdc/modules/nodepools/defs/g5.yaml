# NUMA note: restricted topology policy may reject mixed GPU packing; monitor for TopologyAffinityError
# Karpenter NodePool fleet: g5 (NVIDIA A10G)
# GPU compute — single fleet, scheduling by nvidia.com/gpu resource requests
fleet:
  name: g5
  arch: amd64
  gpu: true
  # Pod-IP bucket (GPU).
  bucket: bucket-2
  exclude_regions:
    - us-west-1
  instances:
    - type: g5.48xlarge
      weight: 100
      node_disk_size: 600
      has_nvme: true
    - type: g5.12xlarge
      weight: 90
      node_disk_size: 600
      has_nvme: true
    - type: g5.24xlarge
      weight: 80
      node_disk_size: 600
      has_nvme: true
    - type: g5.8xlarge
      weight: 70
      node_disk_size: 600
      has_nvme: true
    - type: g5.16xlarge
      weight: 60
      node_disk_size: 600
      has_nvme: true
