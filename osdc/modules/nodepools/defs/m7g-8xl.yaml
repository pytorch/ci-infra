# Karpenter NodePool fleet: m7g-8xl
# AWS Graviton3 — balanced, ARM64, ~4 GiB/core ratio
# Sub-nodepool for ideal m7g.8xlarge; fallback UP to larger m7g sizes (descending weight).
fleet:
  name: m7g-8xl
  arch: arm64
  gpu: false
  instances:
    - type: m7g.8xlarge
      weight: 100  # ideal
      node_disk_size: 650
    - type: m7g.12xlarge
      weight: 85  # fallback
      node_disk_size: 1350
    - type: m7g.16xlarge
      weight: 70  # fallback
      node_disk_size: 1000
