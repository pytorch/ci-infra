# Karpenter NodePool definition: g6.12xlarge
# 4x L4 GPU node — perfect 1:1 fit for 48c/192Gi 4-GPU runners
# Node disk: 100Gi OS + 500Gi images = 600Gi — NVMe instance storage handles container data
nodepool:
  name: g6-12xlarge
  instance_type: g6.12xlarge
  arch: amd64
  node_disk_size: 600
  gpu: true
  has_nvme: true
