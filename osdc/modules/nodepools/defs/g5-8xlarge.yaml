# Karpenter NodePool definition: g5.8xlarge
# Single A10G GPU node — smallest 1-GPU node that fits 16c/64Gi runners + overhead
# Node disk: 100Gi OS + 500Gi images = 600Gi — NVMe instance storage handles container data
nodepool:
  name: g5-8xlarge
  instance_type: g5.8xlarge
  arch: amd64
  node_disk_size: 600
  gpu: true
  has_nvme: true
