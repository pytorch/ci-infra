# Karpenter NodePool fleet: m7g
# AWS Graviton3 — balanced, ARM64, ~4 GiB/core ratio
fleet:
  name: m7g
  arch: arm64
  gpu: false
  instances:
    - type: m7g.metal
      weight: 100
      node_disk_size: 1000
      baremetal: true
    - type: m7g.8xlarge
      weight: 50
      node_disk_size: 500
