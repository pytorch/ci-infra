# Karpenter NodePool definition: r7i.48xlarge
# Memory-optimized pool for AMX/AVX2 runners with ~8 GiB/core ratio
# Intel Sapphire Rapids — required for AMX instruction set
# Node disk: worst case 21x 150Gi pods + 100Gi OS + 500Gi images = 3750Gi
nodepool:
  name: r7i-48xlarge
  instance_type: r7i.48xlarge
  arch: amd64
  node_disk_size: 3750
  gpu: false
