# Karpenter NodePool definition: c7i.12xlarge
# Compute-optimized pool for AMX runners with ~2 GiB/core ratio
# Intel Sapphire Rapids — required for AMX instruction set
# Node disk: worst case 5x 150Gi pods + 100Gi OS + 500Gi images = 1350Gi
nodepool:
  name: c7i-12xlarge
  instance_type: c7i.12xlarge
  arch: amd64
  node_disk_size: 1350
  gpu: false
