# Karpenter NodePool definition: r7g.16xlarge
# Memory-optimized pool for ARM64 memory-heavy runners (~8 GiB/core ratio)
# AWS Graviton3
# Node disk: worst case 1x 600Gi pod + 100Gi OS + 500Gi images = 1200Gi
nodepool:
  name: r7g-16xlarge
  instance_type: r7g.16xlarge
  arch: arm64
  node_disk_size: 1200
  gpu: false
