# Karpenter NodePool definition: r5.24xlarge
# Memory-optimized pool for x86 workloads (~8 GiB/core ratio)
# Intel Cascade Lake
# Kept for RE (Release Engineering) job-assigner workloads (cpu-44, cpu-85)
# Node disk: worst case 1x pod + 100Gi OS + 500Gi images = 800Gi
nodepool:
  name: r5-24xlarge
  instance_type: r5.24xlarge
  arch: amd64
  node_disk_size: 800
  gpu: false
