# Karpenter NodePool definition: g4dn.8xlarge
# Single T4 GPU node — smallest 1-GPU node that fits 16c/64Gi runners + overhead
# Node disk: 100Gi OS only — NVMe instance storage handles container data
nodepool:
  name: g4dn-8xlarge
  instance_type: g4dn.8xlarge
  arch: amd64
  node_disk_size: 100
  gpu: true
  has_nvme: true
