# Karpenter NodePool fleet: r7a-large — dedicated pool for large r7a runners.
# Name-only subset of r7a; separation is enforced by the node-fleet=r7a-large taint.
fleet:
  name: r7a-large
  arch: amd64
  gpu: false
  exclude_regions:
    - us-west-1
  instances:
    - type: r7a.48xlarge
      weight: 100
      node_disk_size: 4800
