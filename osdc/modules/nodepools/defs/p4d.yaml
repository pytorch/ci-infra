# Karpenter NodePool fleet: p4d (8x NVIDIA A100 40GB SXM4)
# GPU compute — single fleet, scheduling by nvidia.com/gpu resource requests.
# Used by: l-x86iavx512-11-125-a100, l-x86iavx512-22-250-a100-2,
#          l-x86iavx512-44-500-a100-4, l-bx86iavx512-88-1000-a100-8
# Capacity: on-demand (no Capacity Block reservation — AWS sells p4d.24xlarge
# on-demand). Cold start adds ~5-10 min to the first job after consolidation.
# Node disk: 100Gi OS only — NVMe instance storage (8x1000GB) handles container
# data. Registry mirrors, CPU governor, and GPU persistence are configured by
# the base registry-mirror-config and node-performance-tuning DaemonSets.
fleet:
  name: p4d
  arch: amd64
  gpu: true
  exclude_regions:
    - us-west-1
  instances:
    - type: p4d.24xlarge
      weight: 100
      node_disk_size: 100
      has_nvme: true
      baremetal: true
      topology_manager_policy: single-numa-node
      topology_manager_scope: pod
