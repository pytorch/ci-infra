# Karpenter NodePool definition: g4dn.12xlarge
# Consolidated pool for x86 T4 GPU workloads (1-4 GPUs)
# Node disk: 100Gi OS only — NVMe instance storage handles container data
nodepool:
  name: g4dn-12xlarge
  instance_type: g4dn.12xlarge
  arch: amd64
  node_disk_size: 100
  gpu: true
  has_nvme: true
