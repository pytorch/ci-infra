# Karpenter NodePool fleet: r7a
# AMD EPYC (Genoa) — memory-optimized, AVX-512, ~8 GiB/core ratio
fleet:
  name: r7a
  arch: amd64
  gpu: false
  exclude_regions:
    - us-west-1
  instances:
    - type: r7a.48xlarge
      weight: 100
      node_disk_size: 4800
    - type: r7a.24xlarge
      weight: 80
      node_disk_size: 2400
    - type: r7a.16xlarge
      weight: 60
      node_disk_size: 1600
    - type: r7a.12xlarge
      weight: 40
      node_disk_size: 1200
    - type: r7a.8xlarge
      weight: 20
      node_disk_size: 800
  # Release wheel-build runners (rel-l-x86iavx512-44-340). Generates the
  # r7a-12xlarge-release NodePool with osdc.io/runner-class: release. r7a.12xlarge
  # (48c/384Gi) matches the manywheel x86 build spec (linux.12xlarge.memory).
  release:
    - type: r7a.12xlarge
      weight: 100
      node_disk_size: 900
