# Karpenter NodePool fleet: c7a-large — dedicated pool for large c7a runners.
# Name-only subset of c7a; separation is enforced by the node-fleet=c7a-large taint.
fleet:
  name: c7a-large
  arch: amd64
  gpu: false
  exclude_regions:
    - us-west-1
  instances:
    - type: c7a.48xlarge
      weight: 100
      node_disk_size: 3750
