# Karpenter NodePool fleet: c7i-large — dedicated pool for large c7i runners.
# Name-only subset of c7i; separation is enforced by the node-fleet=c7i-large taint.
fleet:
  name: c7i-large
  arch: amd64
  gpu: false
  instances:
    - type: c7i.48xlarge
      weight: 100
      node_disk_size: 3750
    - type: c7i.24xlarge
      weight: 85
      node_disk_size: 1900
    - type: c7i.metal-24xl
      weight: 84
      node_disk_size: 800
      baremetal: true
