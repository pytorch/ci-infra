# Karpenter NodePool definition: m7i.48xlarge
# Balanced pool for AMX/AVX2 runners with ~4 GiB/core ratio
# Intel Sapphire Rapids — required for AMX instruction set
# Node disk: worst case 21x 200Gi pods + 100Gi OS + 500Gi images = 4800Gi
nodepool:
  name: m7i-48xlarge
  instance_type: m7i.48xlarge
  arch: amd64
  node_disk_size: 4800
  gpu: false
