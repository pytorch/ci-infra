# Karpenter NodePool fleet: m8g-large — dedicated pool for large m8g runners.
# Name-only subset of m8g; separation is enforced by the node-fleet=m8g-large taint.
fleet:
  name: m8g-large
  arch: arm64
  gpu: false
  instances:
    - type: m8g.48xlarge
      weight: 100
      node_disk_size: 7000
    - type: m8g.24xlarge
      weight: 75
      node_disk_size: 3500
    - type: m8g.16xlarge
      weight: 50
      node_disk_size: 1000
