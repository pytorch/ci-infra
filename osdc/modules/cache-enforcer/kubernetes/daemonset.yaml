# Cache Enforcer DaemonSet
# Installs iptables rules on runner nodes to block direct outbound access to
# external container registries and PyPI, forcing traffic through internal
# caches (Harbor at localhost:30002, pypi-cache at localhost:8080).
#
# Runs only on runner nodes (workload-type: github-runner). The existing
# git-cache-not-ready startup taint ensures iptables rules are in place
# before any runner job pods can schedule.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cache-enforcer
  namespace: kube-system
  labels:
    app: cache-enforcer
    app.kubernetes.io/name: cache-enforcer
    app.kubernetes.io/component: node-configuration
spec:
  selector:
    matchLabels:
      app: cache-enforcer

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: "25%"

  template:
    metadata:
      labels:
        app: cache-enforcer

    spec:
      hostNetwork: true
      hostPID: true

      priorityClassName: system-node-critical

      # Tolerate ALL taints used by Karpenter nodepools
      tolerations:
        - key: instance-type
          operator: Exists
          effect: NoSchedule
        - key: git-cache-not-ready
          operator: Exists
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: cpu-type
          operator: Exists
          effect: NoSchedule
        - key: karpenter.sh/unschedulable
          operator: Exists
          effect: NoSchedule
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/not-ready
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unreachable
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/disk-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/memory-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/pid-pressure
          operator: Exists
          effect: NoSchedule
        - key: node.kubernetes.io/unschedulable
          operator: Exists
          effect: NoSchedule

      # Run on Karpenter-managed runner nodes only
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - github-runner

      serviceAccountName: cache-enforcer

      initContainers:
        - name: enforce-cache
          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          command: ["/bin/bash", "-c"]
          args:
            # hostPID gives access to host's PID 1 root filesystem.
            # nsenter runs the script in the host's mount namespace where
            # modprobe, iptables, and all kernel modules are available.
            # stdin redirection reads the script from the container's
            # ConfigMap mount before nsenter switches namespaces.
            - /proc/1/root/usr/bin/nsenter -t 1 -m -u -i -n -- /bin/bash < /scripts/enforce-cache.sh

          securityContext:
            privileged: true

          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true

      containers:
        - name: sleep
          image: public.ecr.aws/docker/library/alpine:3.19
          command:
            - /bin/sh
            - -c
            - "echo 'Cache enforcer rules applied. Sleeping...'; sleep infinity"

          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

      volumes:
        - name: scripts
          configMap:
            name: cache-enforcer-script
            defaultMode: 0755

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cache-enforcer
  namespace: kube-system
  labels:
    app: cache-enforcer
