# images.yaml - Bootstrap images to mirror to ECR
#
# BOOTSTRAP ONLY: These images are needed to deploy Harbor itself.
# They are copied to ECR by `just mirror-images <env>` using crane.
#
# Once Harbor is running, all other images (ghcr.io, nvcr.io, docker.io,
# registry.k8s.io, quay.io) are pulled through Harbor's proxy cache.
# Containerd on every node is configured to route pulls through Harbor
# (see base/scripts/bootstrap/eks-base-bootstrap.sh and modules/nodepools/).
#
# Images from public.ecr.aws are NOT listed (already on AWS, no rate limits).
#
# Fields:
#   source:     Full upstream image reference (registry/repo:tag)
#   repository: ECR repository name (under mirror/ prefix)

images:
  # Harbor components (docker.io/goharbor) — must be mirrored to ECR
  # because Harbor cannot cache its own images.
  - source: docker.io/goharbor/harbor-core:v2.14.2
    repository: mirror/goharbor/harbor-core
    tag: v2.14.2

  - source: docker.io/goharbor/harbor-jobservice:v2.14.2
    repository: mirror/goharbor/harbor-jobservice
    tag: v2.14.2

  - source: docker.io/goharbor/harbor-portal:v2.14.2
    repository: mirror/goharbor/harbor-portal
    tag: v2.14.2

  - source: docker.io/goharbor/harbor-registryctl:v2.14.2
    repository: mirror/goharbor/harbor-registryctl
    tag: v2.14.2

  - source: docker.io/goharbor/registry-photon:v2.14.2
    repository: mirror/goharbor/registry-photon
    tag: v2.14.2

  - source: docker.io/goharbor/harbor-db:v2.14.2
    repository: mirror/goharbor/harbor-db
    tag: v2.14.2

  - source: docker.io/goharbor/redis-photon:v2.14.2
    repository: mirror/goharbor/redis-photon
    tag: v2.14.2

  - source: docker.io/goharbor/nginx-photon:v2.14.2
    repository: mirror/goharbor/nginx-photon
    tag: v2.14.2

  - source: docker.io/goharbor/harbor-exporter:v2.14.2
    repository: mirror/goharbor/harbor-exporter
    tag: v2.14.2
