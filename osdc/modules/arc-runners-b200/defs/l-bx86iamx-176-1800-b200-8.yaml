# ARC runner definition: l-bx86iamx-176-1800-b200-8 (8x NVIDIA B200, full node)
# Scheduled on NodePool fleet: p6-b200-large (from nodepools-b200 module).
# Uses its OWN fleet — NOT the shared p6-b200-48xlarge pool — because that pool
# pins topologyManagerPolicy: single-numa-node, which an all-8-GPU pod can never
# satisfy on a 2-NUMA-node p6-b200.48xlarge (TopologyAffinityError). See
# nodepools-b200/defs/p6-b200-large.yaml for the full rationale.
runner:
  name: l-bx86iamx-176-1800-b200-8
  instance_type: p6-b200.48xlarge
  node_fleet: p6-b200-large
  disk_size: 200
  vcpu: 176
  memory: 1800Gi
  gpu: 8
  # Fixed-capacity cap: 2 reserved 8-GPU nodes (16 GPUs) / 8 GPUs per runner = 2 concurrent runners.
  max_runners: 2
