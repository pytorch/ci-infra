# ARC runner definition: l-x86iamx-88-900-b200-4 (4x NVIDIA B200)
# Scheduled on NodePool: p6-b200-48xlarge (from nodepools-b200 module)
runner:
  name: l-x86iamx-88-900-b200-4
  instance_type: p6-b200.48xlarge
  disk_size: 200
  vcpu: 88
  memory: 900Gi
  gpu: 4
  fresh_multiplier: 1.0
  # Fixed-capacity cap: 1 reserved 8-GPU node (8 GPUs) / 4 GPUs per runner = 2 concurrent runners.
  max_runners: 2
