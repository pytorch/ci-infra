# ARC runner definition: l-arm64g3-61-502
# Instance type: r7g.16xlarge — 64c/512Gi node
# Note: r7g.16xlarge has 64 vCPU / 512 GiB but allocatable is ~502.9 GiB
# after kubelet reserved (max_pods=737) + DaemonSets. Runner pod adds 750m/512Mi.
runner:
  name: l-arm64g3-61-502
  instance_type: r7g.16xlarge
  disk_size: 600
  vcpu: 61
  memory: 502Gi
  gpu: 0
