# ARC runner definition: l-x86iavx512-45-188-t4-4
# Instance type: g4dn.12xlarge (pool: x86-t4)
# Note: g4dn.12xlarge has 48 vCPU / 192 GiB but allocatable is ~47.5/~186 GiB
# after system overhead. Runner pod adds 750m/512Mi on top. We leave headroom.
runner:
  name: l-x86iavx512-45-188-t4-4
  instance_type: g4dn.12xlarge
  disk_size: 150
  vcpu: 45
  memory: 188Gi
  gpu: 4
