# ARC runner definition: l-arm64g3-61-509
# Instance type: r7g.16xlarge — 64c/512Gi node
# Note: r7g.16xlarge has 64 vCPU / 512 GiB but allocatable is ~63.4/~510.1 GiB
# after system overhead. Runner pod adds 750m/512Mi on top. -1 vCPU for DaemonSet headroom.
runner:
  name: l-arm64g3-61-509
  instance_type: r7g.16xlarge
  disk_size: 600
  vcpu: 61
  memory: 509Gi
  gpu: 0
