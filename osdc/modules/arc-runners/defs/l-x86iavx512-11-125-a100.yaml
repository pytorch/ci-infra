# ARC runner definition: l-x86iavx512-11-125-a100 (1x NVIDIA A100 40GB)
# Scheduled on NodePool: p4d-24xlarge (from nodepools module)
# Resource math: 88 usable vCPU / 8 GPUs = 11 vCPU/GPU, 1000 GiB / 8 = 125 GiB/GPU
runner:
  name: l-x86iavx512-11-125-a100
  instance_type: p4d.24xlarge
  disk_size: 200
  vcpu: 11
  memory: 125Gi
  gpu: 1
  # [TEST-ONLY] ue1 A100 NUMA validation. A 1-GPU pod always fits one zone, so this is
  # a no-op for placement — it's the A/B knob: comment out to compare the default
  # scheduler, or raise vcpu >48 to force an over-one-zone (TopologyAffinityError) test.
  scheduler_name: numa-scheduler
