# ARC runner definition: l-x86iavx2-8-32
# Instance type: m7i.48xlarge (pool: x86-cpu)
runner:
  name: l-x86iavx2-8-32
  instance_type: m7i.48xlarge
  disk_size: 200
  vcpu: 8
  memory: 32Gi
  gpu: 0
  proactive_capacity: 5
  hud_failure_base_capacity: 90
  max_burst_capacity: 2000
  # Pilot: pack workflow pods onto the fullest node (vs default spread).
  scheduler_name: bin-pack-scheduler
