# after system overhead. Runner pod adds 750m/512Mi on top. -1 vCPU for DaemonSet headroom.
runner:
  name: l-x86aavx2-29-125-l4
  instance_type: g6.8xlarge
  disk_size: 150
  vcpu: 29
  memory: 125Gi
  gpu: 1
