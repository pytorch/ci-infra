# nginx caching reverse proxy for pypiserver.
# Mounted as ConfigMap at /etc/nginx/nginx.conf.
# Runs as non-root with nginx-unprivileged image.
#
# Port layout:
#   nginx :8080 (external, Service-facing)
#   pypiserver :8081 (internal, localhost only)
#
# IMPORTANT: max_size (__NGINX_MAX_CACHE_SIZE__) must stay <= the emptyDir
# sizeLimit for the nginx-cache volume (__NGINX_CACHE_SIZE__ in deployment
# template, default 30Gi).  Both are substituted by deploy.sh at deploy time.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Temp paths — writable directories on emptyDir mounts
    proxy_temp_path /var/cache/nginx/proxy_temp;
    client_body_temp_path /tmp/client_body;
    fastcgi_temp_path /tmp/fastcgi;
    uwsgi_temp_path /tmp/uwsgi;
    scgi_temp_path /tmp/scgi;

    access_log /dev/stdout;

    # Extract date for daily log rotation of fallback logs on EFS.
    # nginx evaluates $time_iso8601 per-request; the map extracts YYYY-MM-DD
    # so each day's fallback requests land in a separate file.
    map $time_iso8601 $log_date {
        default                          'date-unknown';
        '~^(?P<ymd>\d{4}-\d{2}-\d{2})'  $ymd;
    }

    # Cache open log file descriptors.  Re-check the path every 1 minute
    # so the daily rollover at midnight picks up the new filename within
    # ~60 seconds.  Acceptable — the wants-collector processes all files.
    open_log_file_cache max=10 inactive=30s valid=1m min_uses=1;

    # Proxy cache for pypi.org fallback AND local pypiserver responses.
    # keys_zone: 200 MB metadata (~1.6M cached entries)
    # max_size: must be <= emptyDir sizeLimit (see header comment)
    # inactive: purge entries not accessed in 7 days
    proxy_cache_path /var/cache/nginx/pypi
        keys_zone=pypi:200m
        max_size=__NGINX_MAX_CACHE_SIZE__
        inactive=7d
        use_temp_path=off;

    # Re-compress responses for clients.  sub_filter requires uncompressed
    # input (Accept-Encoding suppressed upstream), but clients benefit from
    # gzip on the wire.  Only index page MIME types — not binary downloads.
    gzip on;
    gzip_types application/vnd.pypi.simple.v1+json
               application/vnd.pypi.simple.v1+html;
    gzip_proxied any;
    gzip_vary on;

    # Cache key includes Accept header for PEP 691 content negotiation.
    # pypiserver returns HTML or JSON depending on Accept — different
    # representations of the same URL must be cached separately.
    proxy_cache_key "$request_uri|$http_accept";

    # Thundering herd protection — only one request to the backend per
    # unique cache key.  Other requests wait for the first one to
    # populate the cache entry.
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;
    proxy_cache_lock_age 10s;

    # Stream large wheel files — don't buffer to temp files on disk.
    proxy_max_temp_file_size 0;

    # No upload size limit (future: wheel uploads).
    client_max_body_size 0;

    # Backend: pypiserver gunicorn on localhost
    upstream pypiserver {
        server 127.0.0.1:8081;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;

        # DNS resolver for proxying to external pypi.org.
        # Use cluster kube-dns with short TTL for reliability.
        # __DNS_RESOLVER__ is substituted by deploy.sh at ConfigMap
        # creation time (reads kube-dns ClusterIP).
        resolver __DNS_RESOLVER__ valid=30s ipv6=off;

        # Rewrite absolute download URLs in pypi.org responses to relative
        # paths so pip fetches packages through this proxy instead of
        # connecting directly to files.pythonhosted.org (which cache-enforcer
        # blocks on runner nodes).
        sub_filter 'https://files.pythonhosted.org' '';
        sub_filter 'https://download.pytorch.org' '';
        sub_filter_once off;
        sub_filter_types text/html
                         application/vnd.pypi.simple.v1+json
                         application/vnd.pypi.simple.v1+html;
        sub_filter_last_modified on;

        # nginx-local health check — no backend dependency.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
        }

        # End-to-end health — proxied through to pypiserver (uncached).
        location = /health {
            proxy_pass http://pypiserver;
            proxy_cache off;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        # Index pages: /simple/ and /simple/<package>/
        # pypiserver is on localhost — no caching needed here.
        # When pypiserver returns 404 (package not in wheelhouse),
        # nginx intercepts and proxies to pypi.org server-side.
        # Caching happens in @pypi_fallback (external responses only).
        location ~ ^/simple(/|$) {
            proxy_pass http://pypiserver;

            # Cache pypiserver responses for local packages.
            # "local:" prefix prevents cache key collision with @pypi_fallback
            # entries for the same URI.  Accept header needed for PEP 691
            # content negotiation.  Short TTL so new wheels appear quickly.
            proxy_cache pypi;
            proxy_cache_key "local:$request_uri|$http_accept";
            proxy_cache_valid 200 5m;
            add_header X-Cache-Status $upstream_cache_status always;

            # Localhost — fail fast if pypiserver is unresponsive.
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;

            # Intercept errors from pypiserver and fall through to pypi.org.
            # Includes 500 because pypiserver's Bottle framework occasionally
            # returns 500 instead of 404 for missing packages (Bottle #525).
            # NOTE: proxy_intercept_errors fires BEFORE caching, so pypiserver
            # 404s are NOT cached — they correctly fall through to @pypi_fallback.
            proxy_intercept_errors on;
            error_page 404 500 502 503 = @pypi_fallback;

            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        # PyTorch wheel downloads — proxy to download.pytorch.org.
        # sub_filter rewrites absolute download URLs in index pages to
        # relative /whl/... paths.  This location handles file downloads
        # (.whl, .tar.gz, .zip) with long-term caching (immutable packages).
        # Runners set PIP_EXTRA_INDEX_URL to
        #   http://pypi-cache-{slug}:8080/whl/{cuda}/
        # and cache-enforcer blocks direct access to download.pytorch.org.
        #
        # ORDERING: This regex MUST appear before the generic \.(whl|tar\.gz|zip)$
        # location below.  nginx evaluates regex locations in declaration order
        # and the first match wins.  If the generic block appeared first, it
        # would intercept /whl/... requests and route them to pypiserver
        # instead of download.pytorch.org.
        location ~ ^/whl/.*\.(whl|tar\.gz|zip)$ {
            set $pytorch_upstream https://download.pytorch.org;

            proxy_cache pypi;
            proxy_cache_key $request_uri;
            proxy_cache_valid 200 301 1M;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503;

            # Allow caching large packages including CUDA wheels (~900 MB).
            # With NVMe-backed cache storage, disk pressure is no longer a concern.
            proxy_max_temp_file_size 2048m;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;

            proxy_ssl_server_name on;
            proxy_set_header Host download.pytorch.org;
            proxy_set_header Accept-Encoding "";
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_redirect https://download.pytorch.org/ /;
            proxy_pass $pytorch_upstream$request_uri;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        # Wheel and tarball files (pypi.org packages).
        # pypiserver is on localhost — no caching needed here.
        # When pypiserver returns 404 (file not in wheelhouse),
        # nginx intercepts and proxies to pypi.org server-side.
        # Caching happens in @pypi_fallback (external responses only).
        location ~ \.(whl|tar\.gz|zip)$ {
            proxy_pass http://pypiserver;

            # Cache pypiserver wheel downloads.
            # "local:" prefix prevents cache key collision with @pypi_fallback
            # entries for the same URI.  30-day TTL because wheels are immutable.
            # 2048m temp file size allows caching large CUDA wheels (~900MB).
            proxy_cache pypi;
            proxy_cache_key "local:$request_uri";
            proxy_cache_valid 200 30d;
            proxy_max_temp_file_size 2048m;
            add_header X-Cache-Status $upstream_cache_status always;

            # Localhost — fail fast if pypiserver is unresponsive.
            proxy_connect_timeout 2s;
            proxy_read_timeout 10s;

            # Intercept errors from pypiserver and fall through to pypi.org.
            proxy_intercept_errors on;
            error_page 404 500 502 503 = @pypi_fallback;

            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }

        # Server-side fallback to upstream PyPI.
        # When pypiserver returns 404 (package not in local wheelhouse),
        # nginx proxies the original request to pypi.org instead of
        # returning the 404 to the client.  This avoids client-side
        # redirects to HTTPS which runner pods cannot follow.
        location @pypi_fallback {
            # Variable assignment forces runtime DNS resolution via resolver.
            set $pypi_upstream https://pypi.org;
            proxy_pass $pypi_upstream$request_uri;
            proxy_cache pypi;
            access_log /data/logs/upstream/fallback.$log_date.log;

            proxy_cache_valid 200 10m;
            proxy_cache_valid 301 302 1m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503;

            # Short timeouts — fail fast if pypi.org is unreachable
            # rather than hanging until pip's 15s timeout.
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;

            # Rewrite pypi.org redirect Location headers to use the local
            # service URL so clients never see HTTPS pypi.org URLs.
            proxy_redirect https://pypi.org/ /;

            proxy_ssl_server_name on;
            proxy_set_header Host pypi.org;
            # Suppress compression so sub_filter can rewrite response bodies.
            proxy_set_header Accept-Encoding "";
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Pypi-Fallback true always;
        }

        # Package downloads — proxy to files.pythonhosted.org.
        # sub_filter rewrites absolute download URLs in index pages to
        # relative /packages/... paths.  This location handles those
        # rewritten requests, proxying them to the upstream CDN and
        # caching the result.  Without this, pip would connect directly
        # to files.pythonhosted.org (blocked by cache-enforcer).
        location ^~ /packages {
            set $pythonhosted https://files.pythonhosted.org;

            proxy_cache pypi;
            proxy_cache_key $request_uri;
            access_log /data/logs/upstream/fallback.$log_date.log;

            proxy_cache_valid 200 301 1M;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503;

            # Allow caching large packages including CUDA wheels (~900 MB).
            # With NVMe-backed cache storage, disk pressure is no longer a concern.
            proxy_max_temp_file_size 2048m;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;

            proxy_ssl_server_name on;
            proxy_set_header Host files.pythonhosted.org;
            proxy_set_header Accept-Encoding "";
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_pass $pythonhosted$request_uri;

            add_header X-Cache-Status $upstream_cache_status always;
        }

        # PyTorch simple index — proxy to download.pytorch.org.
        # Serves PEP 503 package listings (e.g. /whl/cu121/torch/).
        # Short cache — index pages change when new versions are released.
        # download.pytorch.org returns 403 for packages it doesn't carry
        # (e.g. /whl/cpu/six/). Tools like uv treat 403 as an auth error
        # and abort resolution. Rewrite 403 → 404 so uv falls through to
        # the default index.
        location /whl {
            set $pytorch_upstream https://download.pytorch.org;

            proxy_cache pypi;
            proxy_cache_key $request_uri;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 301 302 1m;
            proxy_cache_valid 403 404 1m;
            proxy_cache_use_stale error timeout updating
                                  http_500 http_502 http_503;

            proxy_intercept_errors on;
            error_page 403 =404 @pytorch_not_found;

            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;

            proxy_ssl_server_name on;
            proxy_set_header Host download.pytorch.org;
            proxy_set_header Accept-Encoding "";
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_redirect https://download.pytorch.org/ /;
            proxy_pass $pytorch_upstream$request_uri;

            add_header X-Cache-Status $upstream_cache_status always;
            add_header X-Pytorch-Index true always;
        }

        location @pytorch_not_found {
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Everything else — pass through uncached.
        location / {
            proxy_pass http://pypiserver;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
        }
    }
}
