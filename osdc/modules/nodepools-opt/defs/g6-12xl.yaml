# NUMA note: restricted topology policy may reject mixed GPU packing; monitor for TopologyAffinityError
# Karpenter NodePool fleet: g6-12xl (NVIDIA L4) — GPU-count-locked fallback tier.
# Sub-nodepool for ideal g6.12xlarge; fallback stays within the same GPU count to avoid stranding GPUs.
fleet:
  name: g6-12xl
  arch: amd64
  gpu: true
  exclude_regions:
    - us-west-1
  instances:
    - type: g6.12xlarge
      weight: 100  # ideal
      node_disk_size: 600
      has_nvme: true
    - type: g6.24xlarge
      weight: 85  # fallback
      node_disk_size: 600
      has_nvme: true
