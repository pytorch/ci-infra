# NUMA note: restricted topology policy may reject mixed GPU packing; monitor for TopologyAffinityError
# Karpenter NodePool fleet: g5-8xl (NVIDIA A10G) — GPU-count-locked fallback tier.
# Sub-nodepool for ideal g5.8xlarge; fallback stays within the same GPU count to avoid stranding GPUs.
fleet:
  name: g5-8xl
  arch: amd64
  gpu: true
  exclude_regions:
    - us-west-1
  instances:
    - type: g5.8xlarge
      weight: 100  # ideal
      node_disk_size: 600
      has_nvme: true
    - type: g5.16xlarge
      weight: 85  # fallback
      node_disk_size: 600
      has_nvme: true
