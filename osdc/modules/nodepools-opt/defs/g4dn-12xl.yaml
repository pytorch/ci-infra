# NUMA note: restricted topology policy may reject mixed GPU packing; monitor for TopologyAffinityError
# Karpenter NodePool fleet: g4dn-12xl (NVIDIA T4) — GPU-count-locked 4-GPU tier.
# Single rung: no larger non-metal 4-GPU g4dn size exists.
fleet:
  name: g4dn-12xl
  arch: amd64
  gpu: true
  instances:
    - type: g4dn.12xlarge
      weight: 100  # ideal
      node_disk_size: 600
      has_nvme: true
