# Karpenter NodePool fleet: r7a-12xl
# AMD EPYC (Genoa) — memory-optimized, AVX-512, ~8 GiB/core ratio
# Sub-nodepool for ideal r7a.12xlarge; fallback UP to larger r7a sizes (descending weight).
fleet:
  name: r7a-12xl
  arch: amd64
  gpu: false
  exclude_regions:
    - us-west-1
  instances:
    - type: r7a.12xlarge
      weight: 100  # ideal
      node_disk_size: 1200
    - type: r7a.16xlarge
      weight: 85  # fallback
      node_disk_size: 1600
    - type: r7a.24xlarge
      weight: 70  # fallback
      node_disk_size: 2400
    - type: r7a.48xlarge
      weight: 55  # fallback
      node_disk_size: 4800
