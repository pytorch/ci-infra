# NUMA note: restricted topology policy may reject mixed GPU packing; monitor for TopologyAffinityError
# Karpenter NodePool fleet: g4dn-8xl (NVIDIA T4) — GPU-count-locked fallback tier.
# Sub-nodepool for ideal g4dn.8xlarge; fallback stays within the same GPU count to avoid stranding GPUs.
fleet:
  name: g4dn-8xl
  arch: amd64
  gpu: true
  instances:
    - type: g4dn.8xlarge
      weight: 100  # ideal
      node_disk_size: 600
      has_nvme: true
    - type: g4dn.16xlarge
      weight: 85  # fallback
      node_disk_size: 600
      has_nvme: true
