# BuildKit Daemon Deployments — one per architecture
# Each pod handles one build at a time (max-parallelism=1).
# amd64 pods: 47 vCPU + 188Gi each (2 per m6id.24xlarge — 96 vCPU / 384 GiB)
# arm64 pods: 30 vCPU + 60Gi each (2 per c7gd.16xlarge — 64 vCPU / 128 GiB)
#
# Users target a specific architecture via Service name:
#   buildctl --addr tcp://buildkitd-arm64.buildkit:1234 ...  (ARM64 build)
#   buildctl --addr tcp://buildkitd-amd64.buildkit:1234 ...  (x86_64 build)
#   buildctl --addr tcp://buildkitd.buildkit:1234 ...        (any arch, round-robin)

# --- Shared pod spec (YAML anchor) ---
# Both deployments use identical container specs; only nodeSelector and labels differ.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-arm64
  namespace: buildkit
  labels:
    app: buildkitd
    arch: arm64
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/component: build-service
spec:
  # replicas managed by deploy.sh from clusters.yaml (kubectl scale)
  selector:
    matchLabels:
      app: buildkitd
      arch: arm64
  template:
    metadata:
      labels:
        app: buildkitd
        arch: arm64
    spec:
      nodeSelector:
        workload-type: buildkit
        instance-type: "c7gd.16xlarge"

      tolerations:
        - key: instance-type
          operator: Equal
          value: "c7gd.16xlarge"
          effect: NoSchedule

      containers:
        - name: buildkitd
          image: moby/buildkit:v0.27.1
          args:
            - --addr
            - unix:///run/buildkit/buildkitd.sock
            - --addr
            - tcp://0.0.0.0:1234
            - --config
            - /etc/buildkit/buildkitd.toml
            - --root
            - /var/lib/buildkit

          ports:
            - name: buildkit
              containerPort: 1234
              protocol: TCP

          # Guaranteed QoS: requests == limits for static CPU pinning
          # 30 vCPU + 60Gi = half a 64-vCPU / 128Gi node after overhead
          resources:
            requests:
              cpu: "30"
              memory: "60Gi"
            limits:
              cpu: "30"
              memory: "60Gi"

          securityContext:
            privileged: true

          readinessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 30

          livenessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 30

          volumeMounts:
            - name: config
              mountPath: /etc/buildkit
              readOnly: true
            - name: buildkit-cache
              mountPath: /var/lib/buildkit
            - name: git-cache
              mountPath: /opt/git-cache
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: buildkitd-config
        # NVMe-backed build cache (formatted and mounted by userData)
        - name: buildkit-cache
          hostPath:
            path: /mnt/buildkit-cache
            type: DirectoryOrCreate
        # Git object cache (maintained by git-cache-warmer DaemonSet)
        - name: git-cache
          hostPath:
            path: /mnt/git-cache
            type: DirectoryOrCreate

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-amd64
  namespace: buildkit
  labels:
    app: buildkitd
    arch: amd64
    app.kubernetes.io/name: buildkitd
    app.kubernetes.io/component: build-service
spec:
  # replicas managed by deploy.sh from clusters.yaml (kubectl scale)
  selector:
    matchLabels:
      app: buildkitd
      arch: amd64
  template:
    metadata:
      labels:
        app: buildkitd
        arch: amd64
    spec:
      nodeSelector:
        workload-type: buildkit
        instance-type: "m6id.24xlarge"

      tolerations:
        - key: instance-type
          operator: Equal
          value: "m6id.24xlarge"
          effect: NoSchedule

      containers:
        - name: buildkitd
          image: moby/buildkit:v0.27.1
