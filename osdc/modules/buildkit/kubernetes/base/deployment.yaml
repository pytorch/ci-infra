            - --addr
            - tcp://0.0.0.0:1234
            - --config
            - /etc/buildkit/buildkitd.toml
            - --root
            - /var/lib/buildkit

          ports:
            - name: buildkit
              containerPort: 1234
              protocol: TCP

          # Guaranteed QoS: requests == limits for static CPU pinning
          # 47 vCPU + 188Gi = half a m6id.24xlarge (96 vCPU / 384 GiB) after overhead
          resources:
            requests:
              cpu: "47"
              memory: "188Gi"
            limits:
              cpu: "47"
              memory: "188Gi"

          securityContext:
            privileged: true

          readinessProbe:
            exec:
              command:
                - buildctl
                - debug
                - workers
            initialDelaySeconds: 5
            periodSeconds: 30

          livenessProbe:
            exec:
              command:
