# Ruff configuration
# https://docs.astral.sh/ruff/configuration/

line-length = 120
target-version = "py312"

[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "W",   # pycodestyle warnings
  "I",   # isort
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
  "SIM", # flake8-simplify
  "RUF", # ruff-specific rules
  "S",   # flake8-bandit (security)
  "T20", # flake8-print (no stray prints)
  "PIE", # flake8-pie (misc improvements)
  "C4",  # flake8-comprehensions
  "PT",  # flake8-pytest-style
  "RSE", # flake8-raise
  "RET", # flake8-return
  "TCH", # flake8-type-checking
  "ARG", # flake8-unused-arguments
  "ERA", # eradicate (commented-out code)
]

ignore = [
  "E501",   # line length handled by formatter
  "S603",   # subprocess calls — we're infra scripts, not a web app
  "S607",   # partial executable path — same reason
  "T201",   # print() is intentional in CLI scripts
  "RET504", # unnecessary assignment before return — readability
  "ARG001", # unused function arguments — common in hooks/callbacks
]

[lint.per-file-ignores]
"**/test_*.py" = [
  "S101",
  "S106",
  "ARG",
] # assert, hardcoded passwords, unused args OK in tests
"**/tests/**" = ["S101", "S106", "ARG"]

[lint.isort]
known-first-party = ["osdc"]
