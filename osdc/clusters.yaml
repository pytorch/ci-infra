# clusters.yaml - Central cluster configuration
#
# Defines every cluster and which modules are installed on each.
# The justfile reads this (via scripts/cluster-config.py) to drive deployments.
#
# Deploy flow per cluster:
#   1. base     — tofu apply (VPC, EKS, Harbor S3/IAM)
#                 mirror bootstrap images, deploy Harbor, base k8s resources
#   2. modules  — each module deployed in listed order
#
# Module deploy contract:
#   Each module may have:
#     terraform/  — independent tofu root (applied separately, gets cluster outputs as -var)
#     kubernetes/ — manifests applied via kubectl/kustomize
#     helm/       — values files for external OCI charts
#     scripts/    — deploy helpers
#
# The base always includes: VPC, EKS, Harbor,
# base k8s resources, git-cache DaemonSet, NVIDIA device plugin, docker images.
# Harbor is NOT optional — every cluster gets a pull-through cache.

defaults:
  # --- Terraform / base infra ---
  base_node_count: 6
  base_node_instance_type: m7i.12xlarge
  base_node_max_unavailable_percentage: 33
  # TODO(CVE-2026-31431): when bumping to a kernel 6.12.85+ AL2023 AMI,
  # remove osdc/base/kubernetes/algif-mitigation.yaml.
  # https://explore.alas.aws.amazon.com/CVE-2026-31431.html
  # TODO(CVE-2026-43284): when bumping to a kernel with the DirtyFrag fix
  # (6.1.170+ or 6.12.83+ on AL2023), remove
  # osdc/base/kubernetes/dirtyfrag-mitigation.yaml.
  # https://aws.amazon.com/security/security-bulletins/2026-027-aws/
  base_node_ami_version: "v20260318"
  eks_version: "1.35"
  single_nat_gateway: false

  # --- CoreDNS sizing ---
  coredns:
    replicas: 6

  # --- Git cache central ---
  git_cache:
    central_replicas: 2
    central_cpu_request: "2"
    central_cpu_limit: "2"
    central_memory_request: "4Gi"
    central_memory_limit: "8Gi"

  # --- Base component tuning ---
  harbor:
    core_replicas: 4
    registry_replicas: 4
    nginx_replicas: 6
    pdb_max_unavailable: 1  # conservative: at most 1 pod down per component

  # --- Module defaults ---
  karpenter:
    replicas: 4
    log_level: info
    pdb_enabled: true
    pdb_min_available: 1
  arc:
    chart_version: "0.14.1-jeanschmidt.9"  # MUST match for controller + runner charts (minor version mismatch = ARS deletion). Fork chart published from jeanschmidt/actions-runner-controller.
    runner_image_tag: "2.334.0"  # ghcr.io/actions/actions-runner tag — pin to avoid :latest
    replica_count: 4
    log_level: info
    controller_cpu_request: "1"
    controller_cpu_limit: "4"
    controller_memory_request: "2Gi"
    controller_memory_limit: "4Gi"
  node_compactor:
    enabled: true
    interval_seconds: 20
    max_uptime_hours: 48
    min_nodes: 1
    dry_run: false
  nodepools:
    gpu_consolidate_after: "40m"
    cpu_consolidate_after: "20m"
    baremetal_consolidate_after: "1h"
    gpu_disruption_budget: "20%"
    cpu_disruption_budget: "20%"
  buildkit:
    replicas_per_arch: 5
  monitoring:
    grafana_cloud_url: "https://prometheus-prod-36-prod-us-west-0.grafana.net/api/prom/push"
    grafana_cloud_read_url: "https://prometheus-prod-36-prod-us-west-0.grafana.net/api/prom"
  logging:
    grafana_cloud_loki_url: "https://logs-prod-021.grafana.net/loki/api/v1/push"
  alloy_chart_version: "1.6.2"
  zombie_cleanup:
    enabled: true
    pending_max_age_hours: 24
    running_max_age_hours: 12
    dry_run: false
  pypi_cache:
    instance_type: r5d.12xlarge
    cuda_versions:
      - "12.6.3"
      - "12.8.1"
      - "13.0.2"
    # NOTE: python_versions is not consumed by manifest generation yet.
    # Reserved for future self-learning builder that will compile wheels
    # for each (cuda_version, python_version) combination.
    python_versions:
      - "3.10"
      - "3.11"
      - "3.12"
      - "3.13"
      - "3.13t"
      - "3.14"
      - "3.14t"
    target_architectures:
      - "x86_64"
      - "aarch64"
    target_manylinux: "2_28"

clusters:
  arc-staging:
    region: us-west-1
    cluster_name: pytorch-arc-staging
    recycle_karpenter_nodes: true
    state_bucket: ciforge-tfstate-arc-staging
    access_config:
      authentication_mode: API_AND_CONFIG_MAP
      cluster_admin_role_names:
        - osdc_gha_staging
    base:
      base_node_count: 2
      base_node_instance_type: m5.4xlarge
      base_node_max_unavailable_percentage: 100  # all-at-once for staging
      single_nat_gateway: true       # cost optimization for staging
      vpc_cidr: "10.0.0.0/16"
    coredns:
      replicas: 2
    harbor:
      core_replicas: 1
      registry_replicas: 1
      nginx_replicas: 1
      pdb_max_unavailable: "100%"  # aggressive: staging has 1 replica each
    karpenter:
      replicas: 1
      log_level: debug
      pdb_enabled: false
      pdb_min_available: 0
    arc:
      replica_count: 1
      log_level: debug
      controller_cpu_request: "500m"
      controller_cpu_limit: "1"
      controller_memory_request: "1Gi"
      controller_memory_limit: "1Gi"
    node_compactor:
      dry_run: true
    nodepools:
      gpu_consolidate_after: "10s"
      cpu_consolidate_after: "10s"
    arc-runners:
      github_config_url: "https://github.com/pytorch/pytorch-canary"
      github_secret_name: pytorch-arc-staging
      runner_name_prefix: "c-mt-"
    buildkit:
      replicas_per_arch: 2
      arm64_instance_type: m7gd.16xlarge
    pypi_cache:
      replicas: 1
    modules:
      - karpenter
      - arc
      - nodepools
      - arc-runners
      - buildkit
      - pypi-cache
      - cache-enforcer
      - zombie-cleanup
      - harbor-cache-recovery
      - monitoring
      - logging

  arc-cbr-production-uw1:
    cluster_name: pytorch-arc-cbr-production-uw1
    region: us-west-1
    state_bucket: ciforge-tfstate-arc-cbr-prod-uw1
    access_config:
      authentication_mode: API_AND_CONFIG_MAP
      cluster_admin_role_names:
        - osdc_gha_prod
    base:
      vpc_cidr: "10.8.0.0/16"
    git_cache:
      central_replicas: 15
      central_cpu_request: "10"
      central_cpu_limit: "15"
      central_memory_request: "10Gi"
      central_memory_limit: "50Gi"
    node_compactor:
      min_node_age_seconds: 900
    buildkit:
      arm64_instance_type: c7gd.16xlarge
      amd64_instance_type: m6id.24xlarge
      pods_per_node: 2
    arc-runners:
      github_config_url: "https://github.com/pytorch"
      github_secret_name: pytorch-arc-cbr-production
      runner_name_prefix: "mt-"
      runner_group: "arc-cbr-prod-uw1"   # distinct from us-east-2's "default" — see doc
    nodepools-h100:
      # us-west-1 H100 capacity reservations (p5.48xlarge, 8× H100 each):
      #   cr-04d3d1d84e127a562 — 2 nodes (16 H100 GPUs)
      #   cr-09a53051589034fb8 — 4 nodes (32 H100 GPUs)
      # Total: 6 nodes, 48 H100 GPUs.
      # Generator change to honor this override is pending — see
      # docs/prod-cluster-ha-us-west-1.md "Phase 1 prerequisite 2".
      capacity_reservation_ids:
        - cr-04d3d1d84e127a562
        - cr-09a53051589034fb8
    pypi_cache:
      replicas: 10
    modules:
      - karpenter
      - arc
      - nodepools
      - nodepools-h100        # H100 only — B200 has no capacity reservation in us-west-1
      - arc-runners
      - arc-runners-h100
      - buildkit
      - pypi-cache
      - cache-enforcer
      - zombie-cleanup
      - harbor-cache-recovery
      - monitoring
      - logging

  arc-cbr-production:
    cluster_name: pytorch-arc-cbr-production
    region: us-east-2
    state_bucket: ciforge-tfstate-arc-cbr-prod
    access_config:
      authentication_mode: API_AND_CONFIG_MAP
      cluster_admin_role_names:
        - osdc_gha_prod
    base:
      vpc_cidr: "10.4.0.0/16"
    git_cache:
      central_replicas: 15
      central_cpu_request: "10"
      central_cpu_limit: "15"
      central_memory_request: "10Gi"
      central_memory_limit: "50Gi"
    node_compactor:
      min_node_age_seconds: 900
    buildkit:
      arm64_instance_type: c7gd.16xlarge
      amd64_instance_type: m6id.24xlarge
      pods_per_node: 2
    arc-runners:
      github_config_url: "https://github.com/pytorch"
      github_secret_name: pytorch-arc-cbr-production
      runner_name_prefix: "mt-"
    nodepools-h100:
      # us-east-2 H100 capacity reservation (p5.48xlarge, 8× H100).
      capacity_reservation_ids:
        - cr-0c3f05dffb85ed832
    nodepools-b200:
      # us-east-2 B200 capacity reservations (p6-b200.48xlarge, 8× B200 each).
      # Two reserved nodes total = 16 B200 GPUs. arc-runners-b200/defs/*.yaml
      # max_runners are sized assuming this count.
      capacity_reservation_ids:
        - cr-02cf82c9a0f7fa8c0
        - cr-06ec9d6c14b9d9981
    pypi_cache:
      replicas: 10
    modules:
      - karpenter
      - arc
      - nodepools
      - nodepools-b200
      - nodepools-h100
      - arc-runners
      - arc-runners-b200
      - arc-runners-h100
      - buildkit
      - pypi-cache
      - cache-enforcer
      - zombie-cleanup
      - harbor-cache-recovery
      - monitoring
      - logging
