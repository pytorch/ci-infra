name: "OSDC: Pre-merge"

on:
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: osdc-pre-merge
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Path filter: skip expensive jobs when no OSDC files changed
  # ------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      osdc: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.osdc == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            osdc:
              - 'osdc/**'
              # Skip staging deploy when the only osdc/ changes are tests.
              # Unit tests already run on the PR via osdc-test.yml; spinning
              # up arc-staging adds nothing for a test-only fix.
              - '!osdc/**/test_*.py'
              - '!osdc/**/*_test.py'
              - '!osdc/**/tests/**'
              - '.github/workflows/_osdc-deploy.yml'
              - '.github/workflows/osdc-auto-update-deploy-prod.yml'
              - '.github/workflows/osdc-deploy-prod.yml'
              - '.github/workflows/osdc-pre-merge.yml'
              - '.github/workflows/osdc-renovate-autoapprove.yml'
              - '.github/workflows/osdc-renovate.yml'

  # ------------------------------------------------------------------
  # Deploy arc-staging + smoke / compactor / integration validation.
  # All jobs live in the reusable workflow so staging and prod stay
  # in sync.
  # ------------------------------------------------------------------
  deploy:
    needs: changes
    if: needs.changes.outputs.osdc == 'true'
    uses: ./.github/workflows/_osdc-deploy.yml
    with:
      cluster: arc-staging
      # Environment gate: the staging role trusts only tokens with
      # environment:osdc-staging in the sub, which blocks fork PRs.
      environment: osdc-staging
      taint_nodes: true
      restart_listeners: true
      run_janitor: true
      run_load_test: true
    # secrets: inherit is required for the reusable workflow to pick up
    # osdc-staging environment secrets (META_AWS_ACC_ID, META_AWS_DEPLOY_ROLE,
    # CANARY_GITHUB_TOKEN). Without it, secrets.* resolves to empty strings.
    secrets: inherit
