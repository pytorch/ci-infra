name: "OSDC: Pre-merge"

on:
  merge_group:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

concurrency:
  group: osdc-pre-merge
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Path filter: skip expensive jobs when no OSDC files changed
  # ------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      osdc: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.osdc == 'true' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            osdc:
              - 'osdc/**'
              - '.github/workflows/osdc-pre-merge.yml'
              - '.github/workflows/_osdc-deploy.yml'

  # ------------------------------------------------------------------
  # Deploy arc-staging + smoke / compactor / integration validation.
  # All jobs live in the reusable workflow so staging and prod stay
  # in sync.
  # ------------------------------------------------------------------
  deploy:
    needs: changes
    if: needs.changes.outputs.osdc == 'true'
    uses: ./.github/workflows/_osdc-deploy.yml
    with:
      cluster: arc-staging
      # Environment gate: the staging role trusts only tokens with
      # environment:osdc-staging in the sub, which blocks fork PRs.
      environment: osdc-staging
      # arc-staging has recycle_karpenter_nodes=true, which makes the taint
      # block a no-op — pass false to be explicit.
      taint_nodes: false
    secrets:
      META_AWS_ACC_ID: ${{ secrets.META_AWS_ACC_ID }}
      META_AWS_DEPLOY_ROLE: ${{ secrets.META_AWS_DEPLOY_STAGING_ROLE }}
      CANARY_GITHUB_TOKEN: ${{ secrets.CANARY_GITHUB_TOKEN }}
