name: "OSDC: Test"

on:
  push:
    branches: [main]
    paths:
      - "osdc/**"
      - ".github/workflows/osdc-test.yml"
  pull_request:
    paths:
      - "osdc/**"
      - ".github/workflows/osdc-test.yml"

permissions:
  contents: read

concurrency:
  group: osdc-test-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: osdc

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install just
        uses: extractions/setup-just@dd310ad5a97d8e7b02571f4b93f237e4de6b874b # v2.0.0

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          install: true
          working_directory: osdc

      - name: Install Python dependencies
        run: uv sync

      - name: Run tests
        run: just test
