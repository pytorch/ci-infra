name: "OSDC: Deploy production"

# Manual rollout for arc-production. Protected by the `osdc-production` GitHub
# environment (configure required reviewers in repo Settings → Environments) —
# the `osdc_gha_prod` IAM role additionally trusts only tokens with
# `environment:osdc-production` in the sub claim, so IAM enforces the gate too.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (sha/branch/tag) to deploy"
        required: false
        type: string
        default: main
      run_smoke:
        description: "Run smoke tests after deploy"
        required: false
        type: boolean
        default: true
      taint_nodes:
        description: "Taint ARC runner nodes before deploy (graceful refresh)"
        required: false
        type: boolean
        default: true

concurrency:
  group: osdc-deploy-arc-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/_osdc-deploy.yml
    with:
      cluster: arc-production
      role_to_assume: arn:aws:iam::308535385114:role/osdc_gha_prod
      environment: osdc-production
      ref: ${{ inputs.ref }}
      run_smoke: ${{ inputs.run_smoke }}
      taint_nodes: ${{ inputs.taint_nodes }}
