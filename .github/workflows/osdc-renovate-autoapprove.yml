name: "OSDC: Auto-approve Renovate runner-image PRs"

# Renovate opens runner-image bump PRs with branch prefix `renovate-runner/`
# and label `auto-runner-update`. The branch ruleset on main requires 1
# approving review, and GitHub forbids self-approval — so a SEPARATE identity
# (OSDC_APPROVER_TOKEN, a PAT from a different bot/user than RENOVATE_TOKEN)
# approves the PR and adds it to the merge queue. The merge queue triggers
# osdc-pre-merge.yml which runs full staging deploy + smoke + integration +
# load test. If green, the PR squash-merges to main; if red, the PR is
# ejected and no merge happens.
#
# Uses pull_request_target so we have access to OSDC_APPROVER_TOKEN. We do
# NOT checkout PR code — only call the GitHub API — so there is no risk of
# executing untrusted PR content. The job-level `if:` rejects fork PRs and
# requires the runner-image branch prefix + label; the first step verifies
# the PR author matches the configured Renovate bot identity.
#
# Required OSDC_APPROVER_TOKEN scope (fine-grained PAT, REQUIRED):
#   - Repository permissions:
#       - Contents: Read                 (read PR diff)
#       - Pull requests: Read and write  (submit approving review, enqueue)
#       - Metadata: Read                 (always required)
#   - DO NOT grant: Workflows, Administration, Actions, Secrets, or any
#     organization permissions.
#   - MUST be a DIFFERENT identity than RENOVATE_TOKEN — GitHub forbids
#     self-approval, so the approver cannot be the PR author.
#   - Owner: a dedicated bot account, NOT a human's PAT.
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, labeled]

permissions:
  contents: read

concurrency:
  group: osdc-renovate-approve-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  approve-and-queue:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'renovate-runner/') &&
      contains(github.event.pull_request.labels.*.name, 'auto-runner-update')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify PR author matches expected Renovate bot
        env:
          EXPECTED_BOT: ${{ vars.OSDC_RENOVATE_BOT_LOGIN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          if [ -z "$EXPECTED_BOT" ]; then
            echo "::error::Repo variable OSDC_RENOVATE_BOT_LOGIN must be set to the exact login of the Renovate bot identity (e.g. 'osdc-renovate-bot')."
            exit 1
          fi
          if [ "$PR_AUTHOR" != "$EXPECTED_BOT" ]; then
            echo "::error::PR author '$PR_AUTHOR' does not match expected Renovate bot '$EXPECTED_BOT' — refusing to auto-approve."
            exit 1
          fi
          echo "Author check passed: $PR_AUTHOR"

      # Defense-in-depth: even if RENOVATE_TOKEN is compromised, refuse to
      # auto-approve unless the PR diff matches the expected single-line
      # runner_image_tag bump. Intentionally redundant with the same guard
      # in osdc-auto-update-deploy-prod.yml (post-merge) — if the metadata
      # gates leak (compromised token producing a PR with the right author,
      # branch, label), this stops auto-approval from rubber-stamping
      # arbitrary content. Uses the read-only GITHUB_TOKEN so we don't
      # widen the approver token's blast radius for diff inspection.
      - name: Validate PR diff content
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          FILES_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate)
          NUM_FILES=$(echo "$FILES_JSON" | jq 'length')
          if [ "$NUM_FILES" != "1" ]; then
            echo "::error::Expected exactly 1 file changed in PR #$PR_NUMBER; got $NUM_FILES. Refusing to auto-approve."
            exit 1
          fi

          FILE_PATH=$(echo "$FILES_JSON" | jq -r '.[0].filename')
          if [ "$FILE_PATH" != "osdc/clusters.yaml" ]; then
            echo "::error::Expected only osdc/clusters.yaml to change; got $FILE_PATH. Refusing to auto-approve."
            exit 1
          fi

          PATCH=$(echo "$FILES_JSON" | jq -r '.[0].patch')
          # Extract changed lines (skip diff hunk headers --- and +++)
          ADDED=$(echo "$PATCH" | grep -E '^\+[^+]' || true)
          REMOVED=$(echo "$PATCH" | grep -E '^-[^-]' || true)
          ADDED_COUNT=$(printf '%s' "$ADDED" | grep -c '^' || true)
          REMOVED_COUNT=$(printf '%s' "$REMOVED" | grep -c '^' || true)
          if [ "$ADDED_COUNT" != "1" ] || [ "$REMOVED_COUNT" != "1" ]; then
            echo "::error::Expected exactly 1 line added + 1 line removed; got +$ADDED_COUNT/-$REMOVED_COUNT. Refusing to auto-approve."
            echo "Patch:"
            echo "$PATCH"
            exit 1
          fi

          # Strict pattern: leading whitespace + runner_image_tag: "X.Y.Z" + optional trailing comment
          PATTERN='^    runner_image_tag:[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"[[:space:]]*(#.*)?$'
          NEW_LINE="${ADDED#+}"
          OLD_LINE="${REMOVED#-}"
          if ! echo "$NEW_LINE" | grep -qE "$PATTERN"; then
            echo "::error::New line does not match runner_image_tag semver pattern. Refusing to auto-approve."
            echo "New line: $NEW_LINE"
            exit 1
          fi
          if ! echo "$OLD_LINE" | grep -qE "$PATTERN"; then
            echo "::error::Old line does not match runner_image_tag semver pattern. Refusing to auto-approve."
            echo "Old line: $OLD_LINE"
            exit 1
          fi

          # Monotonicity: reject downgrades (defense against compromised RENOVATE_TOKEN
          # rolling back to a known-vulnerable runner version).
          OLD_VER=$(printf '%s' "$OLD_LINE" | sed -nE 's/^    runner_image_tag:[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)".*$/\1/p')
          NEW_VER=$(printf '%s' "$NEW_LINE" | sed -nE 's/^    runner_image_tag:[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)".*$/\1/p')
          if [ -z "$OLD_VER" ] || [ -z "$NEW_VER" ]; then
            echo "::error::Failed to extract version strings (old='$OLD_VER' new='$NEW_VER'). Refusing to auto-approve."
            exit 1
          fi
          if [ "$OLD_VER" = "$NEW_VER" ]; then
            echo "::error::No version change ($OLD_VER -> $NEW_VER). Refusing to auto-approve."
            exit 1
          fi
          HIGHEST=$(printf '%s\n%s\n' "$NEW_VER" "$OLD_VER" | sort -V | tail -1)
          if [ "$HIGHEST" != "$NEW_VER" ]; then
            echo "::error::Downgrade detected ($OLD_VER -> $NEW_VER). Refusing to auto-approve."
            exit 1
          fi
          echo "Version bump validated: $OLD_VER -> $NEW_VER"
          echo "Diff validation passed — single-line runner_image_tag bump confirmed."

      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.OSDC_APPROVER_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr review --approve \
            --body "Auto-approved by OSDC auto-approver: runner-image bump PR from Renovate." \
            "$PR_NUMBER" \
            --repo "$REPO"

      - name: Add to merge queue (auto-merge)
        env:
          GH_TOKEN: ${{ secrets.OSDC_APPROVER_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # --auto: GitHub waits for required checks + merge queue, then
          # squash-merges. With merge queue configured on main, this enqueues
          # the PR; osdc-pre-merge.yml runs in the queue context.
          gh pr merge --squash --auto \
            "$PR_NUMBER" \
            --repo "$REPO"
