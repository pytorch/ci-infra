name: "Grafana: Cleanup preview dashboards"

on:
  pull_request:
    types: [closed]
    paths:
      - grafana/**

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PREVIEW_FOLDER: pr-preview-${{ github.event.pull_request.number }}
      # Parent folder UID — previews are created as subfolders of this.
      PARENT_FOLDER: ftzkfk
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install mise
        uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
        with:
          version: 2026.5.11
          install: true

      - name: Generate resources for deletion
        run: |
          cd grafana
          python3 generator.py \
            --folder "$PREVIEW_FOLDER" \
            --folder-title "PR Preview #${{ github.event.pull_request.number }}" \
            --parent-folder "$PARENT_FOLDER"

      - name: Delete preview resources
        continue-on-error: true
        run: |
          cd grafana
          mise exec -- gcx resources delete -p generated
        env:
          GRAFANA_TOKEN: ${{ secrets.PYTORCHCI_GRAFANA_API_TOKEN }}
