name: "OSDC: Auto-deploy runner image to prod"

# Fires after a Renovate runner-image auto-update PR merges to main. Deploys
# the new runner image to both prod clusters sequentially (uw1 first, smoke,
# then ue2, smoke). This is the post-merge half of the runner-image update
# automation; the pre-merge half (staging deploy + validation) runs on the
# PR via osdc-pre-merge.yml in the merge queue.
#
# IMPORTANT: This workflow assumes the merge queue is configured on `main`
# AND that osdc-pre-merge.yml is a required check in the queue. Without
# that, the Renovate PR auto-merges on EasyCLA + 1 approval without any
# staging validation. Verify repo Settings -> Branches -> main has merge
# queue enabled and osdc-pre-merge listed as required before relying on
# this workflow for safe rollouts.
#
# The check-trigger job uses a TRIPLE gate (label + exact bot author +
# branch prefix `renovate-runner/`) so this workflow ONLY fires for
# runner-image auto-update PRs.
#
# Concurrency shares a group with osdc-deploy-prod so this and manual prod
# deploys never overlap.
on:
  push:
    branches: [main]
    paths:
      - osdc/clusters.yaml

concurrency:
  group: osdc-deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
    steps:
      - id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          EXPECTED_BOT: ${{ vars.OSDC_RENOVATE_BOT_LOGIN }}
        run: |
          set -euo pipefail
          if [ -z "$EXPECTED_BOT" ]; then
            echo "::error::Repo variable OSDC_RENOVATE_BOT_LOGIN must be set to the exact login of the Renovate bot identity."
            exit 1
          fi

          PR_JSON=""
          for i in 1 2 3 4 5; do
            PR_JSON=$(gh api "repos/$REPO/commits/$SHA/pulls" --jq '.[0] // empty' || true)
            if [ -n "$PR_JSON" ]; then
              break
            fi
            if [ "$i" -lt 5 ]; then
              echo "Attempt $i/5: PR not yet associated with $SHA â€” retrying in 10s..."
              sleep 10
            fi
          done
          if [ -z "$PR_JSON" ]; then
            echo "No PR found for $SHA after 5 retries (~50s) â€” treating as direct push to main, skipping deploy."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LABELS=$(echo "$PR_JSON" | jq -r '.labels[].name')
          AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref // ""')
          echo "PR labels: $LABELS"
          echo "PR author: $AUTHOR (expected: $EXPECTED_BOT)"
          echo "PR head:   $HEAD_REF"

          LABEL_OK=false
          AUTHOR_OK=false
          BRANCH_OK=false
          if echo "$LABELS" | grep -qx 'auto-runner-update'; then LABEL_OK=true; fi
          if [ "$AUTHOR" = "$EXPECTED_BOT" ]; then AUTHOR_OK=true; fi
          case "$HEAD_REF" in
            renovate-runner/*) BRANCH_OK=true ;;
          esac

          if [ "$LABEL_OK" = "true" ] && [ "$AUTHOR_OK" = "true" ] && [ "$BRANCH_OK" = "true" ]; then
            echo "Triple gate passed â€” validating diff content..."
          else
            echo "Triple gate failed (label=$LABEL_OK author=$AUTHOR_OK branch=$BRANCH_OK) â€” skipping."
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Diff-content validation: defense-in-depth against compromised RENOVATE_TOKEN.
          # Even if all metadata gates pass, only deploy if the actual diff is a
          # single-line runner_image_tag bump matching strict semver.
          COMMIT_JSON=$(gh api "repos/$REPO/commits/$SHA")
          NUM_FILES=$(echo "$COMMIT_JSON" | jq '.files | length')
          if [ "$NUM_FILES" != "1" ]; then
            echo "::error::Expected exactly 1 file changed in $SHA; got $NUM_FILES. Refusing to deploy."
            exit 1
          fi

          FILE_PATH=$(echo "$COMMIT_JSON" | jq -r '.files[0].filename')
          if [ "$FILE_PATH" != "osdc/clusters.yaml" ]; then
            echo "::error::Expected only osdc/clusters.yaml to change; got $FILE_PATH. Refusing to deploy."
            exit 1
          fi

          PATCH=$(echo "$COMMIT_JSON" | jq -r '.files[0].patch')
          # Extract changed lines (skip diff hunk headers --- and +++)
          ADDED=$(echo "$PATCH" | grep -E '^\+[^+]' || true)
          REMOVED=$(echo "$PATCH" | grep -E '^-[^-]' || true)
          ADDED_COUNT=$(printf '%s' "$ADDED" | grep -c '^' || true)
          REMOVED_COUNT=$(printf '%s' "$REMOVED" | grep -c '^' || true)
          if [ "$ADDED_COUNT" != "1" ] || [ "$REMOVED_COUNT" != "1" ]; then
            echo "::error::Expected exactly 1 line added + 1 line removed; got +$ADDED_COUNT/-$REMOVED_COUNT. Refusing to deploy."
            echo "Patch:"
            echo "$PATCH"
            exit 1
          fi

          # Strict pattern: leading whitespace + runner_image_tag: "X.Y.Z" + optional trailing comment
          PATTERN='^    runner_image_tag:[[:space:]]*"[0-9]+\.[0-9]+\.[0-9]+"[[:space:]]*(#.*)?$'
          NEW_LINE="${ADDED#+}"
          OLD_LINE="${REMOVED#-}"
          if ! echo "$NEW_LINE" | grep -qE "$PATTERN"; then
            echo "::error::New line does not match runner_image_tag semver pattern. Refusing to deploy."
            echo "New line: $NEW_LINE"
            exit 1
          fi
          if ! echo "$OLD_LINE" | grep -qE "$PATTERN"; then
            echo "::error::Old line does not match runner_image_tag semver pattern. Refusing to deploy."
            echo "Old line: $OLD_LINE"
            exit 1
          fi

          # Monotonicity: reject downgrades (defense against compromised RENOVATE_TOKEN
          # rolling back to a known-vulnerable runner version).
          OLD_VER=$(printf '%s' "$OLD_LINE" | sed -nE 's/^    runner_image_tag:[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)".*$/\1/p')
          NEW_VER=$(printf '%s' "$NEW_LINE" | sed -nE 's/^    runner_image_tag:[[:space:]]*"([0-9]+\.[0-9]+\.[0-9]+)".*$/\1/p')
          if [ -z "$OLD_VER" ] || [ -z "$NEW_VER" ]; then
            echo "::error::Failed to extract version strings (old='$OLD_VER' new='$NEW_VER'). Refusing to deploy."
            exit 1
          fi
          if [ "$OLD_VER" = "$NEW_VER" ]; then
            echo "::error::No version change ($OLD_VER -> $NEW_VER). Refusing to deploy."
            exit 1
          fi
          HIGHEST=$(printf '%s\n%s\n' "$NEW_VER" "$OLD_VER" | sort -V | tail -1)
          if [ "$HIGHEST" != "$NEW_VER" ]; then
            echo "::error::Downgrade detected ($OLD_VER -> $NEW_VER). Refusing to deploy."
            exit 1
          fi
          echo "Version bump validated: $OLD_VER -> $NEW_VER"

          echo "Diff validation passed â€” single-line runner_image_tag bump confirmed."
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"

  # IMPORTANT: `runner_image_tag` (the value Renovate bumps in clusters.yaml)
  # is consumed ONLY by modules/arc-runners/scripts/python/generate_runners.py,
  # which is invoked by modules/arc-runners/deploy.sh and re-used by the
  # arc-runners-{b200,h100} delegate modules. If a future module also reads
  # `runner_image_tag`, add it to the `modules:` list below or the auto-update
  # will leave that module stale after a bump.
  deploy_uw1:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_deploy == 'true'
    uses: ./.github/workflows/_osdc-deploy.yml
    with:
      cluster: arc-cbr-production-uw1
      environment: osdc-production
      modules: "arc-runners,arc-runners-h100"
      run_smoke: true
      run_integration: false
      run_compactor: false
      run_janitor: false
      run_load_test: false
      skip_lint_test: true
    secrets: inherit

  deploy_ue2:
    needs: deploy_uw1
    if: ${{ !cancelled() && needs.deploy_uw1.result == 'success' }}
    uses: ./.github/workflows/_osdc-deploy.yml
    with:
      cluster: arc-cbr-production
      environment: osdc-production
      modules: "arc-runners,arc-runners-b200,arc-runners-h100"
      run_smoke: true
      run_integration: false
      run_compactor: false
      run_janitor: false
      run_load_test: false
      skip_lint_test: true
    secrets: inherit
